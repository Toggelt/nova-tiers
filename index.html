<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanal Server Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
*{
    box-sizing:border-box;
}
body{
    font-family: Arial, sans-serif;
    background:#0b0b0e;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}
.container{
    width:640px;
    background:#131318;
    padding:20px;
    border-radius:14px;
    border:1px solid #232329;
}
h2{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    white-space:nowrap;
    text-align:center;
    margin-top:4px;
    margin-bottom:18px;
    letter-spacing:2px;
    font-weight:800;
    text-transform:uppercase;
    font-family: 'Orbitron', Arial, sans-serif;
}
.title-icon{
    width:30px;
    height:30px;
    flex-shrink:0;
}
.title-icon svg, .title-icon img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}

/* ---------- Leaderboard Tab Selector ---------- */
.tab-menu{
    display:flex;
    background:#1c1c22;
    border:1px solid #2c2c34;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:16px;
}
.tab-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 8px 9px;
    cursor:pointer;
    color:#8b8b96;
    border-right:1px solid #2c2c34;
    transition: background 0.15s ease, color 0.15s ease;
    user-select:none;
}
.tab-item:last-child{
    border-right:none;
}
.tab-item img{
    width:22px;
    height:22px;
    image-rendering: pixelated;
}
.tab-item span{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.4px;
    white-space:nowrap;
}
.tab-item:hover{
    background:#22222a;
    color:#c9c9d1;
}
.tab-item.active{
    background:#26262e;
    color:#fff;
}
.tab-item.active span{
    color:#a9b6ff;
}

.top-bar{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:14px;
}

/* ---------- Login ---------- */
.login-wrapper{
    position:relative;
}
.login-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:6px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
}
.login-btn:hover{
    background:#26262e;
}
.login-btn.logged-in{
    padding:4px 14px 4px 4px;
}
.login-face{
    width:26px;
    height:26px;
    border-radius:6px;
    overflow:hidden;
    background:#000;
    flex-shrink:0;
    image-rendering: pixelated;
}
.login-face img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.login-panel{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:16px;
    width:220px;
    display:none;
    z-index:60;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.login-panel.active{
    display:block;
}
.login-panel-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:#8b8b96;
    text-transform:uppercase;
    margin-bottom:10px;
}
.login-panel input{
    width:100%;
    background:#131318;
    border:1px solid #2c2c34;
    border-radius:7px;
    color:#fff;
    padding:8px 10px;
    font-size:13px;
    margin-bottom:8px;
    font-family: Arial, sans-serif;
}
.login-panel input:focus{
    outline:none;
    border-color:#4a4a5c;
}
.login-submit{
    width:100%;
    background:#3a3a44;
    border:none;
    color:#fff;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    margin-top:2px;
    transition: background 0.15s ease;
}
.login-submit:hover{
    background:#464652;
}
.login-error{
    color:#ff6b6b;
    font-size:12px;
    margin-top:6px;
    display:none;
}
.logout-btn{
    width:100%;
    background:#241414;
    border:1px solid #7a2323;
    color:#ff8a8a;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    transition: background 0.15s ease;
}
.logout-btn:hover{
    background:#2e1818;
}
.login-panel .logged-name{
    font-size:15px;
    font-weight:700;
    margin-bottom:12px;
    color:#fff;
}

.info-btn-wrapper{
    position:relative;
}
.info-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:7px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
}
.info-btn:hover{
    background:#26262e;
}
.info-icon{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#3a3a44;
    color:#fff;
    font-size:11px;
    font-weight:800;
    font-style:italic;
    font-family: 'Georgia', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}
.info-tooltip{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:12px 16px;
    min-width:180px;
    display:none;
    z-index:50;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.info-btn-wrapper:hover .info-tooltip{
    display:block;
}
.info-tooltip-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:#8b8b96;
    text-transform:uppercase;
    margin-bottom:8px;
}
.info-tooltip-row{
    display:flex;
    justify-content:space-between;
    gap:20px;
    font-size:13px;
    padding:3px 0;
    font-family: monospace;
}
.info-tooltip-row span:first-child{
    font-weight:800;
}

.player{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}
.player:hover{
    transform: scale(1.035);
    box-shadow: 0 6px 16px rgba(0,0,0,0.45);
    filter: brightness(1.25);
}

.rank-flag{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 26px 14px 16px;
    background:#22222a;
    clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
    min-width:120px;
}
.rank-num{
    font-size:26px;
    font-weight:700;
    font-style:italic;
    color:#c7c7ce;
    width:26px;
}
.avatar{
    width:38px;
    height:38px;
    border-radius:6px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    color:#666;
    flex-shrink:0;
    overflow:hidden;
    image-rendering: pixelated;
}
.avatar img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}

.info{
    flex:1;
    display:flex;
    align-items:center;
    padding:0 16px;
    font-size:21px;
    font-weight:700;
    letter-spacing:0.3px;
    font-family: 'Bahnschrift', Arial, sans-serif;
}

.elo-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 22px;
}
.elo{
    font-size:18px;
    font-weight:900;
    color:#a9b6ff;
    font-family: 'Arial Black', Arial, sans-serif;
}
.tier-badge{
    font-size:12px;
    font-weight:800;
    padding:3px 9px;
    border-radius:999px;
    letter-spacing:0.5px;
    border:1px solid currentColor;
    white-space:nowrap;
}

/* Rank 1 - gold */
.rank-1 .rank-flag{
    background: linear-gradient(100deg, #f4c744, #c99a1e);
}
.rank-1 .rank-num{ color:#3a2c00; }

/* Rank 2 - silver */
.rank-2 .rank-flag{
    background: linear-gradient(100deg, #d6d9dd, #9ea3aa);
}
.rank-2 .rank-num{ color:#2b2e33; }

/* Rank 3 - bronze */
.rank-3 .rank-flag{
    background: linear-gradient(100deg, #d98b45, #a85f24);
}
.rank-3 .rank-num{ color:#3a2000; }

.toggle-btn{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#22222a;
    color:#fff;
    border:none;
    border-radius:8px;
    font-family: Arial, sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition: background 0.2s;
}
.toggle-btn:hover{
    background:#2e2e38;
}

/* ---------- Profile Modal ---------- */
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}
.modal-overlay.active{
    display:flex;
}
.modal-box{
    background:#131318;
    border-radius:16px;
    padding:30px;
    width:360px;
    max-width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
    text-align:center;
    border:1px solid #232329;
    font-family: Arial, sans-serif;
}
.modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#22222a;
    border:none;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s;
}
.modal-close:hover{
    background:#2e2e38;
}

.modal-avatar{
    width:110px;
    height:110px;
    border-radius:16px;
    background:#000;
    margin:6px auto 16px;
    overflow:hidden;
    border:2px solid #2a2a32;
    image-rendering: pixelated;
}
.modal-avatar img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}

.modal-name{
    font-family: 'Bahnschrift', Arial, sans-serif;
    font-size:26px;
    font-weight:700;
    margin-bottom:16px;
}

.role-badge{
    display:inline-block;
    padding:8px 22px;
    border-radius:999px;
    font-weight:800;
    font-size:14px;
    letter-spacing:0.6px;
    margin-bottom:26px;
    text-transform:uppercase;
}
.role-player{
    color:#c9c9d1;
    border:1px solid #5a5a64;
    background:#202024;
}
.role-developer{
    color:#ff5c5c;
    border:1px solid #7a2323;
    background:#241414;
}
.role-owner{
    color:#5be6e6;
    border:1px solid #1f6b70;
    background:#132628;
}

.modal-section-label{
    text-align:left;
    color:#8b8b96;
    font-size:13px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:10px;
}

.position-card{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:22px;
}
.position-card .rank-flag{
    min-width:70px;
    padding:12px 22px 12px 14px;
}
.position-card .pos-info{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 14px;
    font-weight:700;
    font-size:15px;
    flex-wrap:wrap;
}
.position-card .pos-info .pos-points{
    color:#8b8b96;
    font-weight:600;
    font-size:13px;
}

.placeholder-card{
    display:flex;
    align-items:center;
    gap:10px;
    background:#17171c;
    border:1px dashed #2c2c34;
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:12px;
    color:#5c5c66;
    font-size:14px;
    font-weight:600;
}
.placeholder-card .ph-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#2c2c34;
    flex-shrink:0;
}
</style>
</head>
<body>
<div class="container">

<!-- Leaderboard Tab Selector -->
<div class="tab-menu" id="tabMenu"></div>

<div class="top-bar">
  <div class="login-wrapper" id="loginWrapper">
    <button class="login-btn" id="loginBtn">Log in</button>
    <div class="login-panel" id="loginPanel"></div>
  </div>
  <div class="info-btn-wrapper">
    <button class="info-btn" id="infoBtn"><span class="info-icon">i</span>Info</button>
    <div class="info-tooltip" id="infoTooltip">Loading...</div>
  </div>
</div>

<h2><span class="title-icon" id="titleIcon"></span><span id="titleText">Kanal Server Leaderboard</span></h2>
<div id="list">Loading...</div>
<button id="toggleBtn" class="toggle-btn" style="display:none;">Show all</button>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-avatar" id="modalAvatar"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="role-badge" id="modalRoleBadge"></div>

    <div class="modal-section-label">Position</div>
    <div class="position-card" id="modalPositionCard"></div>

    <div class="modal-section-label">Other Leaderboards</div>
    <div class="placeholder-card"><div class="ph-dot"></div>Coming soon</div>
    <div class="placeholder-card"><div class="ph-dot"></div>Coming soon</div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
// 🔴 PASTE YOUR KEYS HERE
const SUPABASE_URL = "https://fyyyjjysztzxmmdgubnb.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHwFOpox2rS81CKz832IBg_fZr5GoWH";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLLAPSED_COUNT = 5; // how many players to show before "Show all"
let allPlayers = [];
let expanded = false;

/* ---------- Icons (embedded as data URIs) ---------- */
const HELMET_ICON = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAACgCAMAAAC8EZcfAAAAGFBMVEX///8kHyBNSU0XERFHPj81LS1dVl12anY7r+2yAAAAtUlEQVR4nO3Yuw6DMBBFQV5J/v+P6bwprqwgUBTiOS0sO51lpkmSJEmSJEkaqPlEgICAgIDjAmvJ1lo+7NFaW4CAgICAYwD7rFfr2UrAmr2cCggICAh4G2Ba3G/rBggICAg4LnAOpaMuvQcICAgICPi+uJYsoXoKCAgICAiYL02JmqqJL/9+AwQEBAT8IWAdUseBNQsICAgIOBowUY9/OqEvYgECAgIC3gYoSZIkSZIkSZL0Z+3Dykz1fnGxNQAAAABJRU5ErkJggg==";
const MACE_ICON = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAACgCAMAAAC8EZcfAAAAJ1BMVEX///9CR1IeIimZoa4uMztVXGl8hJG/zudQY5AjQmlmbHp6gsS1pcoCWs1uAAABKUlEQVR4nO3aQVKDQBBA0SRqNOr9z+uue9M1ZdKArb6/ZIB5sKEYOJ1261y032wPBNgNsBtgN8BuQ4GJeYpeo4r6Eh1yIYCAgICAI4EVKyeuqJfoOcptgICAgID/A7hm5cTXaE3diAUICAgIOBy4ZuXompX75bEbUQEBAQEBfw3wPbouq1hVG1EBAQEBAYcDv0vNB1yFSUK+XFWjgICAgIB/GZjlCZM6gAUICAgIOBz4Fn1Ea8LB9w0QEBAQcCSwYt2i3G9NPfi+AQICAgL+ODBZn1HFqroUbcQCBAQEBBwO7LAOCbAbYDfAboDdhgKHsjLAboDdALsBdhsFPBetl9UAAQEBAQFrYP4WtuMq3v0BdgPsBtgNsNt4YPWRBfCeALsBdgPsBtjsC6XtoblKSRRDAAAAAElFTkSuQmCC";

/* ---------- Leaderboards ---------- */
const LEADERBOARDS = {
    KanalServer: {
        key: "KanalServer",
        field: "KanalServer",
        label: "Kanal Server",
        title: "Kanal Server Leaderboard",
        icon: HELMET_ICON
    },
    LowblockMace: {
        key: "LowblockMace",
        field: "LowblockMace",
        label: "Lowblock Mace",
        title: "Lowblock Mace Leaderboard",
        icon: MACE_ICON
    }
};
let currentBoard = "KanalServer";

const list = document.getElementById("list");
const toggleBtn = document.getElementById("toggleBtn");
const tabMenu = document.getElementById("tabMenu");
const titleIcon = document.getElementById("titleIcon");
const titleText = document.getElementById("titleText");

function renderTabMenu(){
    tabMenu.innerHTML = "";
    Object.values(LEADERBOARDS).forEach(board => {
        const el = document.createElement("div");
        el.className = "tab-item" + (board.key === currentBoard ? " active" : "");
        el.innerHTML = `<img src="${board.icon}" alt="${board.label}"><span>${board.label}</span>`;
        el.addEventListener("click", () => switchBoard(board.key));
        tabMenu.appendChild(el);
    });
}

function switchBoard(key){
    if(currentBoard === key) return;
    currentBoard = key;
    expanded = false;
    titleIcon.innerHTML = `<img src="${LEADERBOARDS[key].icon}" alt="">`;
    titleText.textContent = LEADERBOARDS[key].title;
    renderTabMenu();
    render();
}

/* ---------- Tier system ---------- */
// Cumulative % subtracted from HT1 elo (=100%) to reach each tier's threshold
const TIER_STEPS = [
    { name: "LT1", pct: 10 },
    { name: "HT2", pct: 10 },
    { name: "LT2", pct: 10 },
    { name: "HT3", pct: 10 },
    { name: "LT3", pct: 15 },
    { name: "HT4", pct: 15 },
    { name: "LT4", pct: 15 },
    { name: "HT5", pct: 15 }
];
const HT1_BASE = 1250;
const LT5_FLOOR = 1000; // below this elo is always LT5, regardless of scaling

const TIER_COLORS = {
    HT1: "#ffd700",
    LT1: "#e6c15c",
    HT2: "#c9c9d1",
    LT2: "#a9a9b2",
    HT3: "#cd7f32",
    LT3: "#b5793c",
    HT4: "#7d8b99",
    LT4: "#6b7480",
    HT5: "#5a6572",
    LT5: "#454b54"
};

function getTierThresholds(topElo){
    const anchor = topElo >= HT1_BASE ? topElo : HT1_BASE;
    const range = anchor - LT5_FLOOR; // 100% of the scale sits between 1000 (0%) and anchor (100%)
    const thresholds = { HT1: anchor };
    let cumulativePct = 0;
    TIER_STEPS.forEach(step => {
        cumulativePct += step.pct;
        thresholds[step.name] = LT5_FLOOR + range * (1 - cumulativePct / 100);
    });
    return thresholds;
}

function getTier(elo, thresholds){
    if(elo < LT5_FLOOR) return "LT5";
    if(elo >= thresholds.HT1) return "HT1";
    if(elo >= thresholds.LT1) return "LT1";
    if(elo >= thresholds.HT2) return "HT2";
    if(elo >= thresholds.LT2) return "LT2";
    if(elo >= thresholds.HT3) return "HT3";
    if(elo >= thresholds.LT3) return "LT3";
    if(elo >= thresholds.HT4) return "HT4";
    if(elo >= thresholds.LT4) return "LT4";
    if(elo >= thresholds.HT5) return "HT5";
    return "LT5";
}

const infoTooltip = document.getElementById("infoTooltip");
const TIER_ORDER = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5"];

function renderInfoTooltip(thresholds){
    let html = `<div class="info-tooltip-title">Elo required</div>`;
    TIER_ORDER.forEach(name => {
        const val = Math.ceil(thresholds[name]);
        html += `<div class="info-tooltip-row"><span style="color:${TIER_COLORS[name]}">${name}</span><span>${val}+</span></div>`;
    });
    html += `<div class="info-tooltip-row"><span style="color:${TIER_COLORS.LT5}">LT5</span><span>&lt;${LT5_FLOOR}</span></div>`;
    infoTooltip.innerHTML = html;
}

/* ---------- Roles ---------- */
function getRole(name){
    if(name === "TestingCheats") return { label: "Developer", cls: "role-developer" };
    if(name === "cutekiss") return { label: "Tierlist Owner", cls: "role-owner" };
    return { label: "Player", cls: "role-player" };
}

function rankClass(rank){
    if(rank === 1) return "rank-1";
    if(rank === 2) return "rank-2";
    if(rank === 3) return "rank-3";
    return "";
}

function avatarUrl(name, size){
    return `https://mc-heads.net/avatar/${encodeURIComponent(name)}/${size}`;
}

function getSortedPlayers(field){
    return [...allPlayers]
        .filter(p => p[field] !== null && p[field] !== undefined)
        .sort((a, b) => b[field] - a[field]);
}

function render(){
    const field = LEADERBOARDS[currentBoard].field;
    const sorted = getSortedPlayers(field);

    list.innerHTML = "";
    const playersToShow = expanded ? sorted : sorted.slice(0, COLLAPSED_COUNT);
    const topElo = sorted.length ? sorted[0][field] : 0;
    const thresholds = getTierThresholds(topElo);
    renderInfoTooltip(thresholds);

    if(sorted.length === 0){
        list.innerHTML = `<div class="placeholder-card"><div class="ph-dot"></div>No players on this leaderboard yet</div>`;
        toggleBtn.style.display = "none";
        return;
    }

    playersToShow.forEach((p, i) => {
        const rank = i + 1;
        const elo = p[field];
        const tier = getTier(elo, thresholds);
        const div = document.createElement("div");
        div.className = `player ${rankClass(rank)}`;
        div.innerHTML = `
            <div class="rank-flag">
                <span class="rank-num">${rank}.</span>
                <div class="avatar">
                    <img src="${avatarUrl(p.name, 38)}" alt="${p.name}" onerror="this.parentElement.innerHTML='?'">
                </div>
            </div>
            <div class="info">${p.name}</div>
            <div class="elo-wrap">
                <span class="elo">${elo}</span>
                <span class="tier-badge" style="color:${TIER_COLORS[tier]}">${tier}</span>
            </div>
        `;
        div.addEventListener("click", () => openProfile(p, rank, tier, field));
        list.appendChild(div);
    });

    if(sorted.length > COLLAPSED_COUNT){
        toggleBtn.style.display = "block";
        toggleBtn.textContent = expanded ? "Show less" : `Show all (${sorted.length})`;
    } else {
        toggleBtn.style.display = "none";
    }
}

toggleBtn.addEventListener("click", () => {
    expanded = !expanded;
    render();
});

/* ---------- Profile Modal logic ---------- */
const modalOverlay = document.getElementById("modalOverlay");
const modalClose = document.getElementById("modalClose");
const modalAvatar = document.getElementById("modalAvatar");
const modalName = document.getElementById("modalName");
const modalRoleBadge = document.getElementById("modalRoleBadge");
const modalPositionCard = document.getElementById("modalPositionCard");

function openProfile(player, rank, tier, field){
    modalAvatar.innerHTML = `<img src="${avatarUrl(player.name, 110)}" alt="${player.name}" onerror="this.parentElement.innerHTML='?'">`;
    modalName.textContent = player.name;

    const role = getRole(player.name);
    modalRoleBadge.textContent = role.label;
    modalRoleBadge.className = `role-badge ${role.cls}`;

    modalPositionCard.className = `position-card ${rankClass(rank)}`;
    modalPositionCard.innerHTML = `
        <div class="rank-flag">
            <span class="rank-num">${rank}.</span>
        </div>
        <div class="pos-info">
            🏆 ${LEADERBOARDS[currentBoard].label.toUpperCase()} <span class="pos-points">(${player[field]} points)</span>
            <span class="tier-badge" style="color:${TIER_COLORS[tier]}">${tier}</span>
        </div>
    `;

    modalOverlay.classList.add("active");
}

function closeProfile(){
    modalOverlay.classList.remove("active");
}

modalClose.addEventListener("click", closeProfile);
modalOverlay.addEventListener("click", (e) => {
    if(e.target === modalOverlay) closeProfile();
});

/* ---------- Login ---------- */
const loginBtn = document.getElementById("loginBtn");
const loginPanel = document.getElementById("loginPanel");
const loginWrapper = document.getElementById("loginWrapper");
let currentUser = null; // kept in memory only, resets on page reload

function renderLoggedOutPanel(){
    loginPanel.innerHTML = `
        <div class="login-panel-title">Player Login</div>
        <input type="text" id="loginUsername" placeholder="Minecraft username" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
        <button class="login-submit" id="loginSubmit">Log in</button>
        <div class="login-error" id="loginError">Invalid username or password.</div>
    `;
    document.getElementById("loginSubmit").addEventListener("click", attemptLogin);
    document.getElementById("loginPassword").addEventListener("keydown", (e) => {
        if(e.key === "Enter") attemptLogin();
    });
}

function renderLoggedInPanel(){
    loginPanel.innerHTML = `
        <div class="logged-name">${currentUser.name}</div>
        <button class="logout-btn" id="logoutBtn">Log out</button>
    `;
    document.getElementById("logoutBtn").addEventListener("click", logout);
}

async function attemptLogin(){
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorEl = document.getElementById("loginError");
    errorEl.style.display = "none";

    if(!username || !password) return;

    const { data, error } = await supabase
        .from("players")
        .select("*")
        .ilike("name", username)
        .maybeSingle();

    if(error || !data || data.password !== password){
        errorEl.style.display = "block";
        return;
    }

    currentUser = data;
    updateLoginButton();
    renderLoggedInPanel();
}

function logout(){
    currentUser = null;
    updateLoginButton();
    renderLoggedOutPanel();
    loginPanel.classList.remove("active");
}

function updateLoginButton(){
    if(currentUser){
        loginBtn.classList.add("logged-in");
        loginBtn.innerHTML = `
            <div class="login-face"><img src="${avatarUrl(currentUser.name, 26)}" alt=""></div>
            ${currentUser.name}
        `;
    } else {
        loginBtn.classList.remove("logged-in");
        loginBtn.textContent = "Log in";
    }
}

loginBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    loginPanel.classList.toggle("active");
});

document.addEventListener("click", (e) => {
    if(!loginWrapper.contains(e.target)){
        loginPanel.classList.remove("active");
    }
});

renderLoggedOutPanel();

/* ---------- Init ---------- */
renderTabMenu();
titleIcon.innerHTML = `<img src="${LEADERBOARDS[currentBoard].icon}" alt="">`;
titleText.textContent = LEADERBOARDS[currentBoard].title;

async function loadPlayers(){
    const { data, error } = await supabase
        .from("players")
        .select("*");

    if(error){
        list.innerHTML = "Error loading data";
        toggleBtn.style.display = "none";
        return;
    }

    allPlayers = data;
    render();

    // keep logged-in user's data fresh (e.g. elo updates) without logging them out
    if(currentUser){
        const fresh = allPlayers.find(p => p.name.toLowerCase() === currentUser.name.toLowerCase());
        if(fresh) currentUser = fresh;
    }
}

loadPlayers();
setInterval(loadPlayers, 5000); // auto refresh every 5 sec
</script>
