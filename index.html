<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanal Server Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
/* ---------- All existing styles unchanged ---------- */
*{
    box-sizing:border-box;
}
body{
    font-family: Arial, sans-serif;
    background:#0b0b0e;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}
.container{
    width:640px;
    background:#131318;
    padding:20px;
    border-radius:14px;
    border:1px solid #232329;
}
h2{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    white-space:nowrap;
    text-align:center;
    margin-top:4px;
    margin-bottom:18px;
    letter-spacing:2px;
    font-weight:800;
    text-transform:uppercase;
    font-family: 'Orbitron', Arial, sans-serif;
}
.title-icon{
    width:42px;
    height:42px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
}
.title-icon img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.title-icon .emoji-icon{
    font-size:34px;
    line-height:1;
}
.tab-menu{
    display:flex;
    background:#1c1c22;
    border:1px solid #2c2c34;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:16px;
}
.tab-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 8px 9px;
    cursor:pointer;
    color:#8b8b96;
    border-right:1px solid #2c2c34;
    transition: background 0.15s ease, color 0.15s ease;
    user-select:none;
}
.tab-item:last-child{
    border-right:none;
}
.tab-item img{
    width:32px;
    height:32px;
    image-rendering: pixelated;
}
.tab-item .emoji-icon{
    font-size:28px;
    line-height:1;
}
.tab-item span.tab-label{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.4px;
    white-space:nowrap;
}
.tab-item:hover{
    background:#22222a;
    color:#c9c9d1;
}
.tab-item.active{
    background:#26262e;
    color:#fff;
}
.tab-item.active span.tab-label{
    color:#a9b6ff;
}
.top-bar{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:14px;
}

/* ---------- Login & Play button wrapper ---------- */
.login-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
    position:fixed;
    top:26px;
    right:34px;
    z-index:200;
}
.play-btn-wrapper{
    position:relative;
}
.play-btn{
    background:#1a3a6a;
    border:2px solid #2a5a8a;
    color:#fff;
    font-weight:800;
    font-size:14px;
    padding:6px 16px;
    border-radius:8px;
    cursor:pointer;
    transition: background 0.2s, transform 0.2s, border-color 0.2s;
    font-family: Arial, sans-serif;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:6px;
}
.play-btn .play-icon{
    display:inline-block;
    font-size:16px;
    line-height:1;
}
.play-btn .play-label{
    display:inline-block;
}
.play-btn.logged-in{
    background:#1a6a3a;
    border-color:#2a9a5a;
}
.play-btn.logged-in:hover{
    background:#2a8a4a;
    transform:scale(1.08);
    border-color:#3aaa6a;
}
.play-btn.logged-out{
    background:#6a3a1a;
    border-color:#8a5a2a;
    opacity:0.8;
    cursor:not-allowed;
}
.play-btn.logged-out:hover{
    transform:none;
    background:#6a3a1a;
    border-color:#8a5a2a;
}
.play-tooltip{
    position:absolute;
    top:calc(100% + 6px);
    left:50%;
    transform:translateX(-50%);
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:6px;
    padding:4px 10px;
    font-size:12px;
    color:#c9c9d1;
    white-space:nowrap;
    display:none;
    z-index:210;
    pointer-events:none;
}
.play-btn-wrapper:hover .play-tooltip{
    display:block;
}

.login-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:8px 18px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}
.login-btn:hover{
    background:#26262e;
}
.login-btn.logged-in{
    padding:5px 16px 5px 5px;
}
.login-face{
    width:26px;
    height:26px;
    border-radius:6px;
    overflow:hidden;
    background:#000;
    flex-shrink:0;
    image-rendering: pixelated;
}
.login-face img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.login-panel{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:16px;
    width:220px;
    display:none;
    z-index:200;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.login-panel.active{
    display:block;
}
.login-panel-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:#8b8b96;
    text-transform:uppercase;
    margin-bottom:10px;
}
.login-panel input{
    width:100%;
    background:#131318;
    border:1px solid #2c2c34;
    border-radius:7px;
    color:#fff;
    padding:8px 10px;
    font-size:13px;
    margin-bottom:8px;
    font-family: Arial, sans-serif;
}
.login-panel input:focus{
    outline:none;
    border-color:#4a4a5c;
}
.login-submit{
    width:100%;
    background:#3a3a44;
    border:none;
    color:#fff;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    margin-top:2px;
    transition: background 0.15s ease;
}
.login-submit:hover{
    background:#464652;
}
.login-error{
    color:#ff6b6b;
    font-size:12px;
    margin-top:6px;
    display:none;
}
.logout-btn{
    width:100%;
    background:#241414;
    border:1px solid #7a2323;
    color:#ff8a8a;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    transition: background 0.15s ease;
}
.logout-btn:hover{
    background:#2e1818;
}
.login-panel .logged-name{
    font-size:15px;
    font-weight:700;
    margin-bottom:12px;
    color:#fff;
}
.profile-btn{
    width:100%;
    background:#1a2a3a;
    border:1px solid #2a4a6a;
    color:#8ab4f8;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    transition: background 0.15s ease;
    margin-bottom:8px;
}
.profile-btn:hover{
    background:#1f3348;
}

/* ---------- Queue Modal ---------- */
.queue-modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1500;
    padding:20px;
}
.queue-modal-overlay.active{
    display:flex;
}
.queue-modal-box{
    background:#131318;
    border-radius:20px;
    padding:40px 30px;
    width:700px;
    max-width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
    text-align:center;
    border:1px solid #2a2a3a;
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
}
.queue-modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#22222a;
    border:none;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s;
}
.queue-modal-close:hover{
    background:#3a3a4a;
}
.queue-modal-title{
    font-family: 'Bahnschrift', Arial, sans-serif;
    font-size:28px;
    font-weight:700;
    margin-bottom:24px;
    letter-spacing:1px;
}
.queue-modes-container{
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}
.queue-mode-column{
    flex:1 1 250px;
    background:#191920;
    border:2px solid #2a2a3a;
    border-radius:16px;
    padding:20px 16px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}
.queue-mode-column .mode-header{
    display:flex;
    align-items:center;
    gap:12px;
}
.queue-mode-column .mode-header img{
    width:40px;
    height:40px;
    image-rendering: pixelated;
}
.queue-mode-column .mode-header .mode-label{
    font-size:20px;
    font-weight:700;
}
.queue-btn{
    background:#1a6a3a;
    border:2px solid #2a9a5a;
    color:#fff;
    font-weight:800;
    font-size:16px;
    padding:10px 20px;
    border-radius:12px;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s;
    font-family: Arial, sans-serif;
    letter-spacing:1px;
    width:100%;
    max-width:200px;
    position:relative;
}
.queue-btn:hover:not(:disabled){
    background:#2a8a4a;
    transform:scale(1.04);
}
.queue-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
.queue-btn.queued{
    background:#b8860b;
    border-color:#daa520;
}
.queue-btn.queued .queue-btn-text{
    display:inline;
}
.queue-btn.queued .queue-btn-leave{
    display:none;
}
.queue-btn.queued:hover:not(:disabled){
    background:#6a1a1a;
    border-color:#8a3a3a;
    transform:scale(1.04);
}
.queue-btn.queued:hover .queue-btn-text{
    display:none;
}
.queue-btn.queued:hover .queue-btn-leave{
    display:inline;
}
.queue-btn .queue-btn-leave{
    color:#fff;
    font-weight:800;
}
.queue-stats{
    font-size:14px;
    color:#8b8b96;
    margin-top:2px;
}
.queue-stats span{
    font-weight:700;
    color:#c9c9d1;
}

/* ---------- Match Found Modal ---------- */
.match-modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2000;
    padding:20px;
}
.match-modal-overlay.active{
    display:flex;
}
.match-modal-box{
    background:#131318;
    border-radius:20px;
    padding:40px 30px;
    max-width:750px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
    border:2px solid #2a3a3a;
    box-shadow: 0 0 60px rgba(0,200,0,0.15);
    text-align:center;
    position:relative;
}
.match-modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#22222a;
    border:none;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s;
}
.match-modal-close:hover{
    background:#3a3a4a;
}
.match-modal-title{
    font-family: 'Bahnschrift', Arial, sans-serif;
    font-size:24px;
    font-weight:700;
    margin-bottom:8px;
}
.match-modal-subtitle{
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:12px;
}
.match-modal-subtitle img{
    width:36px;
    height:36px;
    image-rendering: pixelated;
}
.match-timer{
    font-size:28px;
    font-weight:800;
    color:#ffcc00;
    margin:6px 0 12px;
}
.match-kit-image{
    margin:10px auto;
    max-width:100%;
    border-radius:12px;
    border:2px solid #2a3a3a;
}
.match-kit-image img{
    width:100%;
    max-height:280px;
    object-fit:contain;
    display:block;
    border-radius:12px;
}
.match-accept-btn{
    background:#2a8a4a;
    border:2px solid #4aba6a;
    color:#fff;
    font-weight:800;
    font-size:22px;
    padding:14px 40px;
    border-radius:12px;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s;
    margin:16px auto 8px;
}
.match-accept-btn:hover:not(:disabled){
    background:#3a9a5a;
    transform:scale(1.04);
}
.match-accept-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
.match-status-msg{
    font-size:18px;
    color:#ff8a8a;
    margin-top:12px;
}
.match-result-buttons{
    display:flex;
    gap:16px;
    justify-content:center;
    margin-top:16px;
    flex-wrap:wrap;
}
.match-result-btn{
    padding:10px 28px;
    border-radius:10px;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    transition: background 0.2s;
    border:2px solid #3a3a4a;
    background:#22222a;
    color:#c9c9d1;
}
.match-result-btn:hover{
    background:#2a2a3a;
}
.match-result-btn.requeue{
    border-color:#2a9a5a;
    color:#6bff6b;
}
.match-result-btn.requeue:hover{
    background:#1a3a2a;
}
.match-result-btn.exit{
    border-color:#8a3a3a;
    color:#ff6b6b;
}
.match-result-btn.exit:hover{
    background:#2a1a1a;
}

/* Ready screen */
.match-ready-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}
.match-ready-title img{
    width:28px;
    height:28px;
    image-rendering: pixelated;
}
.match-ready-players{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:30px;
    margin:16px 0;
}
.match-player-box{
    text-align:center;
}
.match-player-box img{
    width:64px;
    height:64px;
    border-radius:50%;
    border:3px solid #4a4a5a;
    image-rendering: pixelated;
}
.match-player-box .name{
    margin-top:6px;
    font-size:16px;
    font-weight:700;
}
.match-vs{
    font-size:32px;
    font-weight:900;
    color:#a9b6ff;
}
.match-server-info{
    font-size:15px;
    color:#8b8b96;
    margin:10px 0 6px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}
.match-server-info .copy-btn{
    background:transparent;
    border:1px solid #4a4a5a;
    color:#c9c9d1;
    padding:2px 8px;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
    transition: background 0.2s;
}
.match-server-info .copy-btn:hover{
    background:#2a2a3a;
}
.match-kit-instruction{
    font-size:14px;
    color:#a9b6ff;
    margin:4px 0;
    line-height:1.6;
}
.match-kit-instruction .copy-kit{
    color:#ffcc00;
    cursor:pointer;
    border-bottom:1px dashed #ffcc00;
    transition: color 0.2s;
}
.match-kit-instruction .copy-kit:hover{
    color:#ffdd44;
}
.match-rules{
    font-size:20px;
    font-weight:700;
    color:#fff;
    margin:12px 0 4px;
}
.match-rules-sub{
    font-size:15px;
    color:#8b8b96;
    margin-bottom:12px;
}
.match-finished-btn{
    background:#2a6a3a;
    border:2px solid #4a9a5a;
    color:#fff;
    font-weight:800;
    font-size:20px;
    padding:12px 40px;
    border-radius:12px;
    cursor:pointer;
    transition: background 0.2s;
    margin-top:12px;
}
.match-finished-btn:hover{
    background:#3a7a4a;
}

/* ---------- Rest of existing styles (unchanged) ---------- */
.info-btn-wrapper{
    position:relative;
}
.info-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:7px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
}
.info-btn:hover{
    background:#26262e;
}
.info-icon{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#3a3a44;
    color:#fff;
    font-size:11px;
    font-weight:800;
    font-style:italic;
    font-family: 'Georgia', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}
.info-tooltip{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:12px 16px;
    min-width:180px;
    display:none;
    z-index:50;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.info-btn-wrapper:hover .info-tooltip{
    display:block;
}
.info-tooltip.overall-tooltip{
    min-width:220px;
    padding:12px 16px;
}
.info-tooltip-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:#8b8b96;
    text-transform:uppercase;
    margin-bottom:8px;
}
.info-tooltip-row{
    display:flex;
    justify-content:space-between;
    gap:16px;
    font-size:13px;
    padding:3px 0;
    font-family: monospace;
}
.info-tooltip-row span:first-child{
    font-weight:800;
}
.overall-tooltip .title-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 2px;
    padding: 4px 0;
}
.overall-tooltip .title-row .title-word {
    font-size: 17px;
    font-weight: 900;
    font-family: 'Bahnschrift', Arial, sans-serif;
    letter-spacing: 0.3px;
    margin-bottom: 0;
}
.overall-tooltip .title-row .title-desc {
    font-size: 13px;
    color: #8b8b96;
    font-weight: 600;
    font-family: monospace;
    padding-left: 0;
}
.search-btn-wrapper{
    position:relative;
}
.search-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:7px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
}
.search-btn:hover{
    background:#26262e;
}
.search-btn svg{
    width:14px;
    height:14px;
    flex-shrink:0;
}
.search-panel{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:14px;
    width:250px;
    display:none;
    z-index:70;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.search-panel.active{
    display:block;
}
.search-input{
    width:100%;
    background:#131318;
    border:1px solid #2c2c34;
    border-radius:7px;
    color:#fff;
    padding:8px 10px;
    font-size:13px;
    margin-bottom:10px;
    font-family: Arial, sans-serif;
}
.search-input:focus{
    outline:none;
    border-color:#4a4a5c;
}
.search-results{
    max-height:220px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:4px;
}
.search-result-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:6px 8px;
    border-radius:7px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
}
.search-result-item:hover{
    background:#22222a;
}
.search-result-item img{
    width:26px;
    height:26px;
    border-radius:5px;
    image-rendering: pixelated;
    background:#000;
    flex-shrink:0;
}
.search-empty{
    color:#5c5c66;
    font-size:12px;
    padding:6px 2px;
}
.player{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
    cursor:pointer;

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// Supabase config
const SUPABASE_URL = "https://fyyyjjysztzxmmdgubnb.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHwFOpox2rS81CKz832IBg_fZr5GoWH";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLLAPSED_COUNT = 5;
let allPlayers = [];
let expanded = false;
let currentUser = null;

// Queue tracking per mode
const queueState = {
  KanalServer: { inQueue: false, joinedAt: null, timerInterval: null, queueId: null },
  LowblockMace: { inQueue: false, joinedAt: null, timerInterval: null, queueId: null }
};

/* ---------- Icons from GitHub ---------- */
const HELMET_ICON_URL = "https://github.com/Toggelt/nova-tiers/blob/main/assets/netherite_helmet.png?raw=true";
const MACE_ICON_URL   = "https://github.com/Toggelt/nova-tiers/blob/main/assets/mace.png?raw=true";
const KANAL_KIT_IMG   = "https://github.com/Toggelt/nova-tiers/blob/main/assets/kanalserver_kit.png?raw=true";
const LOWBLOCK_KIT_IMG = "https://github.com/Toggelt/nova-tiers/blob/main/assets/lowblockmace_kit.png?raw=true";

/* ---------- Leaderboards ---------- */
const LEADERBOARDS = {
    Overall: {
        key: "Overall",
        field: "__total",
        label: "Overall",
        title: "Overall Leaderboard",
        icon: null,
        emoji: "💎"
    },
    KanalServer: {
        key: "KanalServer",
        field: "KanalServer",
        label: "Kanal Server",
        title: "Kanal Server Leaderboard",
        icon: HELMET_ICON_URL,
        emoji: "⛑️"
    },
    LowblockMace: {
        key: "LowblockMace",
        field: "LowblockMace",
        label: "Lowblock Mace",
        title: "Lowblock Mace Leaderboard",
        icon: MACE_ICON_URL,
        emoji: "🔨"
    }
};
const SUB_BOARDS = ["KanalServer", "LowblockMace"];
let currentBoard = "Overall";

const list = document.getElementById("list");
const toggleBtn = document.getElementById("toggleBtn");
const tabMenu = document.getElementById("tabMenu");
const titleIcon = document.getElementById("titleIcon");
const titleText = document.getElementById("titleText");

function iconMarkup(board){
    if(board.icon){
        return `<img src="${board.icon}" alt="${board.label}" style="width:32px;height:32px;image-rendering:pixelated;">`;
    }
    return `<span class="emoji-icon">${board.emoji}</span>`;
}

function renderTabMenu(){
    tabMenu.innerHTML = "";
    Object.values(LEADERBOARDS).forEach(board => {
        const el = document.createElement("div");
        el.className = "tab-item" + (board.key === currentBoard ? " active" : "");
        el.innerHTML = `${iconMarkup(board)}<span class="tab-label">${board.label}</span>`;
        el.addEventListener("click", () => switchBoard(board.key));
        tabMenu.appendChild(el);
    });
}

function setTitle(key){
    titleIcon.innerHTML = iconMarkup(LEADERBOARDS[key]);
    titleText.textContent = LEADERBOARDS[key].title;
}

function switchBoard(key){
    if(currentBoard === key) return;
    currentBoard = key;
    expanded = false;
    setTitle(key);
    renderTabMenu();
    render();
}

/* ---------- Tier system ---------- */
const TIER_STEPS = [
    { name: "LT1", pct: 10 },
    { name: "HT2", pct: 10 },
    { name: "LT2", pct: 10 },
    { name: "HT3", pct: 10 },
    { name: "LT3", pct: 15 },
    { name: "HT4", pct: 15 },
    { name: "LT4", pct: 15 },
    { name: "HT5", pct: 15 }
];
const HT1_BASE = 1250;
const LT5_FLOOR = 1000;
const TIER_COLORS = {
    HT1: "#ffd700",
    LT1: "#e6c15c",
    HT2: "#c9c9d1",
    LT2: "#a9a9b2",
    HT3: "#cd7f32",
    LT3: "#b5793c",
    HT4: "#7d8b99",
    LT4: "#6b7480",
    HT5: "#5a6572",
    LT5: "#454b54"
};
const TIER_ORDER = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];

function getTierThresholds(topElo){
    const anchor = topElo >= HT1_BASE ? topElo : HT1_BASE;
    const range = anchor - LT5_FLOOR;
    const thresholds = { HT1: anchor };
    let cumulativePct = 0;
    TIER_STEPS.forEach(step => {
        cumulativePct += step.pct;
        thresholds[step.name] = LT5_FLOOR + range * (1 - cumulativePct / 100);
    });
    return thresholds;
}

function getTier(elo, thresholds){
    if(elo < LT5_FLOOR) return "LT5";
    if(elo >= thresholds.HT1) return "HT1";
    if(elo >= thresholds.LT1) return "LT1";
    if(elo >= thresholds.HT2) return "HT2";
    if(elo >= thresholds.LT2) return "LT2";
    if(elo >= thresholds.HT3) return "HT3";
    if(elo >= thresholds.LT3) return "LT3";
    if(elo >= thresholds.HT4) return "HT4";
    if(elo >= thresholds.LT4) return "LT4";
    if(elo >= thresholds.HT5) return "HT5";
    return "LT5";
}

function sortEntriesByTier(entries){
    return entries.sort((a, b) => {
        if(a.tier && b.tier && a.tier !== b.tier) {
            return TIER_ORDER.indexOf(a.tier) - TIER_ORDER.indexOf(b.tier);
        }
        if(a.tier && !b.tier) return -1;
        if(!a.tier && b.tier) return 1;
        if(a.hasValue && b.hasValue) return b.elo - a.elo;
        if(a.hasValue) return -1;
        if(b.hasValue) return 1;
        return 0;
    });
}

const infoTooltip = document.getElementById("infoTooltip");
const TIER_ORDER_DISPLAY = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5"];

function renderInfoTooltip(thresholds){
    let html = `<div class="info-tooltip-title">Elo required</div>`;
    TIER_ORDER_DISPLAY.forEach(name => {
        const val = Math.ceil(thresholds[name]);
        html += `<div class="info-tooltip-row"><span style="color:${TIER_COLORS[name]}">${name}</span><span>${val}+</span></div>`;
    });
    html += `<div class="info-tooltip-row"><span style="color:${TIER_COLORS.LT5}">LT5</span><span>&lt;${LT5_FLOOR}</span></div>`;
    infoTooltip.innerHTML = html;
}

/* ---------- Titles ---------- */
function computeTitleThresholds(){
    const gainFor = (tierName) => {
        let total = 0;
        SUB_BOARDS.forEach(key => {
            const board = LEADERBOARDS[key];
            const sorted = getSortedPlayers(board.field);
            const topElo = sorted.length ? sorted[0][board.field] : 0;
            const thresholds = getTierThresholds(topElo);
            total += Math.max(0, thresholds[tierName] - LT5_FLOOR);
        });
        return Math.ceil(total);
    };
    return {
        Divine: gainFor("LT2"),
        Celestial: gainFor("HT3"),
        Eternal: gainFor("LT3"),
        Ascendant: gainFor("HT4"),
        Novice: 0
    };
}

function isNovaPlayer(player){
    if(!SUB_BOARDS.length) return false;
    return SUB_BOARDS.every(key => {
        const board = LEADERBOARDS[key];
        const sorted = getSortedPlayers(board.field);
        return sorted.length && sorted[0].name === player.name;
    });
}

function getPlayerTitle(player){
    if(isNovaPlayer(player)) return "Nova";
    const reqs = computeTitleThresholds();
    const gained = player.__total - 1000 * SUB_BOARDS.length;
    if(gained >= reqs.Divine) return "Divine";
    if(gained >= reqs.Celestial) return "Celestial";
    if(gained >= reqs.Eternal) return "Eternal";
    if(gained >= reqs.Ascendant) return "Ascendant";
    return "Novice";
}

function renderTitleInfoTooltip(){
    const reqs = computeTitleThresholds();
    const colorMap = {
        Nova: "linear-gradient(100deg, #c190ec, #a13ca5)",
        Divine: "linear-gradient(100deg, #cbd4ec, #6468ab)",
        Celestial: "linear-gradient(100deg, #fac140, #c34513)",
        Eternal: "linear-gradient(100deg, #f8ab86, #cb322b)",
        Ascendant: "linear-gradient(100deg, #d67638, #b0483c)",
        Novice: "linear-gradient(100deg, #9d8aa5, #82638a)"
    };
    const descMap = {
        Nova: "#1 in every gamemode",
        Divine: `${reqs.Divine}+ gained`,
        Celestial: `${reqs.Celestial}+ gained`,
        Eternal: `${reqs.Eternal}+ gained`,
        Ascendant: `${reqs.Ascendant}+ gained`,
        Novice: `0+ gained`
    };
    let html = `<div class="info-tooltip-title">Titles</div>`;
    const order = ["Nova", "Divine", "Celestial", "Eternal", "Ascendant", "Novice"];
    order.forEach(name => {
        const grad = colorMap[name];
        const desc = descMap[name];
        html += `
            <div class="info-tooltip-row title-row">
                <span class="title-word title-grad" style="background-image:${grad}">${name}</span>
                <span class="title-desc">${desc}</span>
            </div>
        `;
    });
    infoTooltip.innerHTML = html;
    infoTooltip.classList.add("overall-tooltip");
}

function resetTooltipClass(){
    infoTooltip.classList.remove("overall-tooltip");
}

function renderMiniTierIcons(player){
    const entries = SUB_BOARDS.map(key => {
        const board = LEADERBOARDS[key];
        const sorted = getSortedPlayers(board.field);
        const topElo = sorted.length ? sorted[0][board.field] : 0;
        const thresholds = getTierThresholds(topElo);
        const hasValue = player[board.field] !== null && player[board.field] !== undefined;
        const elo = hasValue ? player[board.field] : null;
        const tier = hasValue ? getTier(elo, thresholds) : null;
        return { board, hasValue, elo, tier };
    });
    const sortedEntries = sortEntriesByTier(entries);
    let html = "";
    sortedEntries.forEach(({ board, hasValue, elo, tier }) => {
        const color = tier ? TIER_COLORS[tier] : "#3a3a44";
        const tipText = hasValue ? `${tier} (${elo})` : "No data";
        html += `
            <div class="mini-tier-wrap" data-tip="${tipText}">
                <div class="mini-tier-circle" style="border-color:${color}">
                    <img src="${board.icon}" alt="${board.label}" style="width:16px;height:16px;image-rendering:pixelated;">
                </div>
            </div>
        `;
    });
    return html;
}

function getRole(name){
    if(name === "TestingCheats") return { label: "Developer", cls: "role-developer" };
    if(name === "cutekiss") return { label: "Tierlist Owner", cls: "role-owner" };
    return { label: "Player", cls: "role-player" };
}

function rankClass(rank){
    if(rank === 1) return "rank-1";
    if(rank === 2) return "rank-2";
    if(rank === 3) return "rank-3";
    return "";
}

function avatarUrl(name, size){
    return `https://mc-heads.net/avatar/${encodeURIComponent(name)}/${size}`;
}

function getSortedPlayers(field){
    return [...allPlayers]
        .filter(p => p[field] !== null && p[field] !== undefined)
        .sort((a, b) => b[field] - a[field]);
}

function render(){
    const field = LEADERBOARDS[currentBoard].field;
    const isOverall = currentBoard === "Overall";
    const sorted = getSortedPlayers(field);
    list.innerHTML = "";
    const playersToShow = expanded ? sorted : sorted.slice(0, COLLAPSED_COUNT);

async function attemptLogin(){
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorEl = document.getElementById("loginError");
    errorEl.style.display = "none";
    if(!username || !password) return;
    const email = buildEmail(username);
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const { data: playerData, error: playerError } = await supabase
            .from("players")
            .select("*")
            .ilike("name", username)
            .maybeSingle();
        if (playerError || !playerData) {
            await supabase.auth.signOut();
            errorEl.textContent = "Account exists but no player profile found. Contact admin.";
            errorEl.style.display = "block";
            return;
        }
        currentUser = playerData;
        updateLoginButton();
        renderLoggedInPanel();
        loginPanel.classList.remove("active");
        enableQueueButtons(true);
        refreshQueueStatus();
        startMatchmakingPolling();
        subscribeToMatches();
    } catch (err) {
        errorEl.textContent = "Invalid username or password.";
        errorEl.style.display = "block";
    }
}

async function handleQueueAction(mode){
    if(!currentUser) return;
    const state = queueState[mode];
    if(state.inQueue){
        await leaveQueue(mode);
    } else {
        await joinQueue(mode);
    }
}

async function joinQueue(mode){
    try {
        const btn = mode === "KanalServer" ? queueBtnKanal : queueBtnMace;
        btn.disabled = true;
        btn.textContent = "Joining...";
        const response = await fetch(`${SUPABASE_URL}/functions/v1/join-queue`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ game_mode: mode })
        });
        if (!response.ok) throw new Error(await response.text());
        const data = await response.json();
        const state = queueState[mode];
        state.inQueue = true;
        state.joinedAt = Date.now();
        state.queueId = data.id;
        startTimer(mode);
        btn.classList.add("queued");
        btn.innerHTML = `<span class="queue-btn-text">In Queue (0:00)</span><span class="queue-btn-leave">Leave Queue</span>`;
        btn.disabled = false;
        fetchQueueStats();
    } catch (error) {
        console.error('Join queue error:', error);
        alert('Failed to join queue: ' + error.message);
        const btn = mode === "KanalServer" ? queueBtnKanal : queueBtnMace;
        btn.disabled = false;
        btn.textContent = "Queue";
    }
}

async function leaveQueue(mode){
    try {
        const btn = mode === "KanalServer" ? queueBtnKanal : queueBtnMace;
        btn.disabled = true;
        btn.textContent = "Leaving...";
        const response = await fetch(`${SUPABASE_URL}/functions/v1/leave-queue`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ game_mode: mode })
        });
        if (!response.ok) throw new Error(await response.text());
        const state = queueState[mode];
        state.inQueue = false;
        state.joinedAt = null;
        state.queueId = null;
        if(state.timerInterval){
            clearInterval(state.timerInterval);
            state.timerInterval = null;
        }
        btn.classList.remove("queued");
        btn.innerHTML = `Queue`;
        btn.disabled = false;
        fetchQueueStats();
    } catch (error) {
        console.error('Leave queue error:', error);
        alert('Failed to leave queue: ' + error.message);
        const btn = mode === "KanalServer" ? queueBtnKanal : queueBtnMace;
        btn.disabled = false;
    }
}

function startTimer(mode){
    const state = queueState[mode];
    if(state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
        if(!state.inQueue || !state.joinedAt){
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            return;
        }
        const elapsed = Math.floor((Date.now() - state.joinedAt) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
        const btn = mode === "KanalServer" ? queueBtnKanal : queueBtnMace;
        const textSpan = btn.querySelector('.queue-btn-text');
        if(textSpan){
            textSpan.textContent = `In Queue (${timeStr})`;
        }
    }, 1000);
}

async function refreshQueueStatus(){
    if(!currentUser) return;
    try {
        const { data, error } = await supabase
            .from('queue')
            .select('*')
            .eq('player_id', currentUser.id)
            .eq('status', 'waiting');
        if (error) throw error;
        Object.keys(queueState).forEach(m => {
            const state = queueState[m];
            state.inQueue = false;
            state.joinedAt = null;
            state.queueId = null;
            if(state.timerInterval){
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            const btn = m === "KanalServer" ? queueBtnKanal : queueBtnMace;
            btn.classList.remove("queued");
            btn.innerHTML = `Queue`;
        });
        data.forEach(entry => {
            const mode = entry.game_mode;
            const state = queueState[mode];
            state.inQueue = true;
            state.joinedAt = new Date(entry.joined_at).getTime();
            state.queueId = entry.id;
            const btn = mode === "KanalServer" ? queueBtnKanal : queueBtnMace;
            btn.classList.add("queued");
            btn.innerHTML = `<span class="queue-btn-text">In Queue (0:00)</span><span class="queue-btn-leave">Leave Queue</span>`;
            startTimer(mode);
        });
    } catch (e) {
        console.error('Refresh queue error:', e);
    }
}

async function fetchQueueStats(){
    try {
        const [kanalQueue, maceQueue, kanalMatches, maceMatches] = await Promise.all([
            supabase.from('queue').select('id', { count: 'exact', head: true }).eq('game_mode', 'KanalServer').eq('status', 'waiting'),
            supabase.from('queue').select('id', { count: 'exact', head: true }).eq('game_mode', 'LowblockMace').eq('status', 'waiting'),
            supabase.from('matches').select('id', { count: 'exact', head: true }).eq('game_mode', 'KanalServer').eq('status', 'pending'),
            supabase.from('matches').select('id', { count: 'exact', head: true }).eq('game_mode', 'LowblockMace').eq('status', 'pending')
        ]);
        if (kanalQueue.error) throw kanalQueue.error;
        if (maceQueue.error) throw maceQueue.error;
        if (kanalMatches.error) throw kanalMatches.error;
        if (maceMatches.error) throw maceMatches.error;
        queueCountKanal.textContent = kanalQueue.count || 0;
        queueCountMace.textContent = maceQueue.count || 0;
        matchCountKanal.textContent = kanalMatches.count || 0;
        matchCountMace.textContent = maceMatches.count || 0;
    } catch (e) {
        console.error('Stats fetch error:', e);
    }
}

async function callMatchmaker(){
    try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/matchmake`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}`,
                'Content-Type': 'application/json'
            }
        });
        if (!response.ok) console.warn('Matchmaker error:', await response.text());
    } catch (e) {
        console.error('Matchmaker call failed:', e);
    }
}

function startMatchmakingPolling(){
    if(window.matchmakingInterval) clearInterval(window.matchmakingInterval);
    window.matchmakingInterval = setInterval(callMatchmaker, 10000);
    callMatchmaker();
}

let matchSubscription = null;

function subscribeToMatches(){
    if(matchSubscription) {
        matchSubscription.unsubscribe();
        matchSubscription = null;
    }
    if(!currentUser) return;
    matchSubscription = supabase
        .channel('public:matches')
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'matches',
            filter: `player1_id=eq.${currentUser.id},player2_id=eq.${currentUser.id}`,
        }, (payload) => {
            const match = payload.new;
            if (match.status === 'pending' && (match.player1_id === currentUser.id || match.player2_id === currentUser.id)) {
                handleNewMatch(match);
            }
        })
        .subscribe();
}

function closeMatchModal(){
    if(matchTimerInterval){
        clearInterval(matchTimerInterval);
        matchTimerInterval = null;
    }
    if(matchTimeoutId){
        clearTimeout(matchTimeoutId);
        matchTimeoutId = null;
    }
    matchModalOverlay.classList.remove('active');
    isReadyScreen = false;
    currentMatch = null;
}

document.getElementById('matchModalClose').addEventListener('click', closeMatchModal);

async function handleNewMatch(match){
    // If a match modal is already open, close it first
    closeMatchModal();
    currentMatch = match;
    const isPlayer1 = match.player1_id === currentUser.id;
    const opponentId = isPlayer1 ? match.player2_id : match.player1_id;
    const { data: opponent, error } = await supabase
        .from('players')
        .select('name')
        .eq('id', opponentId)
        .maybeSingle();
    if (error || !opponent) {
        console.error('Failed to fetch opponent:', error);
        return;
    }
    const modeLabel = match.game_mode === 'KanalServer' ? 'Kanal Server' : 'Lowblock Mace';
    const modeIcon = match.game_mode === 'KanalServer' ? HELMET_ICON_URL : MACE_ICON_URL;
    const kitImg = match.game_mode === 'KanalServer' ? KANAL_KIT_IMG : LOWBLOCK_KIT_IMG;
    // Show the match modal with accept screen
    showAcceptScreen(match, opponent, modeLabel, modeIcon, kitImg);
    // Start 30-second timer
    startMatchTimer(30, match, opponent, modeLabel, modeIcon, kitImg);
}

function showAcceptScreen(match, opponent, modeLabel, modeIcon, kitImg){
    const isPlayer1 = match.player1_id === currentUser.id;
    const yourName = currentUser.name;
    const oppName = opponent.name;
    const html = `
        <div class="match-modal-title">⚔️ Match found for:</div>
        <div class="match-modal-subtitle">
            <img src="${modeIcon}" alt="${modeLabel}"> ${modeLabel}
        </div>
        <div class="match-timer" id="matchTimer">30</div>
        <div style="font-size:18px; color:#a9b6ff; margin-bottom:6px;">You have 30 seconds to accept</div>
        <div class="match-kit-image"><img src="${kitImg}" alt="${modeLabel} Kit"></div>
        <button class="match-accept-btn" id="matchAcceptBtn">✅ Accept</button>
        <div class="match-status-msg" id="matchStatusMsg"></div>
    `;
    matchModalContent.innerHTML = html;
    matchModalOverlay.classList.add('active');

    document.getElementById('matchAcceptBtn').addEventListener('click', async () => {
        // Disable button
        const btn = document.getElementById('matchAcceptBtn');
        btn.disabled = true;
        btn.textContent = 'Accepting...';
        try {
            const response = await fetch(`${SUPABASE_URL}/functions/v1/accept-match`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ match_id: match.id, player_id: currentUser.id })
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            if (data.success) {
                btn.textContent = '✅ Accepted!';
                // Wait for opponent to accept or timeout
                // We'll listen to match updates via Realtime
            } else {
                btn.textContent = '❌ Failed';
                btn.disabled = false;
            }
        } catch (err) {
            console.error('Accept error:', err);
            btn.textContent = '❌ Error';
            btn.disabled = false;
        }
    });
}

function startMatchTimer(seconds, match, opponent, modeLabel, modeIcon, kitImg){
    let remaining = seconds;
    const timerEl = document.getElementById('matchTimer');
    if (timerEl) timerEl.textContent = remaining;
    if (matchTimerInterval) clearInterval(matchTimerInterval);
    matchTimerInterval = setInterval(() => {
        remaining--;
        if (timerEl) timerEl.textContent = remaining;
        if (remaining <= 0) {
            clearInterval(matchTimerInterval);
            matchTimerInterval = null;
            // Timeout – handle penalty
            handleTimeout(match, opponent, modeLabel, modeIcon, kitImg);
        }
    }, 1000);
}

async function handleTimeout(match, opponent, modeLabel, modeIcon, kitImg){
    // Check who accepted
    const { data: updatedMatch, error } = await supabase
        .from('matches')
        .select('player1_accepted, player2_accepted, player1_id, player2_id')
        .eq('id', match.id)
        .single();
    if (error) {
        console.error('Error fetching match status:', error);
        return;
    }
    const p1Accepted = updatedMatch.player1_accepted;
    const p2Accepted = updatedMatch.player2_accepted;
    const isPlayer1 = match.player1_id === currentUser.id;
    const p1AcceptedFinal = p1Accepted;
    const p2AcceptedFinal = p2Accepted;

    // Determine penalties
    let penalizedPlayers = [];
    if (!p1AcceptedFinal) penalizedPlayers.push(match.player1_id);
    if (!p2AcceptedFinal) penalizedPlayers.push(match.player2_id);

    // Apply penalties via Edge Function
    for (const pid of penalizedPlayers) {
        try {
            await fetch(`${SUPABASE_URL}/functions/v1/penalize-player`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ player_id: pid, game_mode: match.game_mode })
            });
        } catch (e) {
            console.error('Penalty error:', e);
        }
    }

    // Show result screen
    const isPlayer1Current = match.player1_id === currentUser.id;
    const iAccepted = isPlayer1Current ? p1AcceptedFinal : p2AcceptedFinal;
    const opponentAccepted = isPlayer1Current ? p2AcceptedFinal : p1AcceptedFinal;

    let statusMsg = '';
    if (iAccepted && !opponentAccepted) {
        statusMsg = 'Opponent didn\'t accept. You get +5 elo!';
    } else if (!iAccepted && opponentAccepted) {
        statusMsg = 'You didn\'t accept. You lost 5 elo.';
    } else if (!iAccepted && !opponentAccepted) {
        statusMsg = 'Both players didn\'t accept. Both lost 5 elo.';
    } else {
        // Should not happen – both accepted
    }

    // Show result screen with buttons
    showResultScreen(match, opponent, modeLabel, modeIcon, kitImg, statusMsg);
}

function showResultScreen(match, opponent, modeLabel, modeIcon, kitImg, statusMsg){
    const html = `
        <div class="match-modal-title">⏰ Time's up!</div>
        <div style="font-size:20px; color:#ff8a8a; margin:12px 0;">${statusMsg}</div>
        <div class="match-result-buttons">
            <button class="match-result-btn requeue" id="requeueBtn">🔄 Requeue</button>
            <button class="match-result-btn exit" id="exitBtn">✖ Exit</button>
        </div>
    `;
    matchModalContent.innerHTML = html;
    document.getElementById('requeueBtn').addEventListener('click', async () => {
        // Close match modal, open queue modal, and join queue for the same game mode
        closeMatchModal();
        openQueueModal();
        // Automatically join the queue for that mode
        await joinQueue(match.game_mode);
    });
    document.getElementById('exitBtn').addEventListener('click', () => {
        closeMatchModal();
    });
}

// Listen for updates on the match (when both accept)
function subscribeToMatchUpdates(matchId){
    const channel = supabase
        .channel(`match-${matchId}`)
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'matches',
            filter: `id=eq.${matchId}`
        }, async (payload) => {
            const updated = payload.new;
            if (updated.status === 'accepted' || (updated.player1_accepted && updated.player2_accepted)) {
                // Both accepted – show ready screen
                if (matchTimerInterval) {
                    clearInterval(matchTimerInterval);
                    matchTimerInterval = null;
                }
                await showReadyScreen(updated);
            }
        })
        .subscribe();
    return channel;
}

// Override handleNewMatch to include subscription
const originalHandleNewMatch = handleNewMatch;
handleNewMatch = async function(match) {
    await originalHandleNewMatch(match);
    // After showing accept screen, subscribe to updates
    const channel = subscribeToMatchUpdates(match.id);
    // Store channel for cleanup
    if (window.matchChannel) window.matchChannel.unsubscribe();
    window.matchChannel = channel;
};

        list.innerHTML = "Error loading data";
        toggleBtn.style.display = "none";
        return;
    }
    allPlayers = data.map(p => ({

    if(currentUser){
        const fresh = allPlayers.find(p => p.name.toLowerCase() === currentUser.name.toLowerCase());
        if(fresh) currentUser = fresh;
    }
}
