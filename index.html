<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanal Server Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
/* ---------- All existing styles ---------- */
*{
    box-sizing:border-box;
}
body{
    font-family: Arial, sans-serif;
    background:#0b0b0e;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}
.container{
    width:640px;
    background:#131318;
    padding:20px;
    border-radius:14px;
    border:1px solid #232329;
}
h2{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    white-space:nowrap;
    text-align:center;
    margin-top:4px;
    margin-bottom:18px;
    letter-spacing:2px;
    font-weight:800;
    text-transform:uppercase;
    font-family: 'Orbitron', Arial, sans-serif;
}
.title-icon{
    width:42px;
    height:42px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
}
.title-icon img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.title-icon .emoji-icon{
    font-size:34px;
    line-height:1;
}
.tab-menu{
    display:flex;
    background:#1c1c22;
    border:1px solid #2c2c34;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:16px;
}
.tab-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 8px 9px;
    cursor:pointer;
    color:#8b8b96;
    border-right:1px solid #2c2c34;
    transition: background 0.15s ease, color 0.15s ease;
    user-select:none;
}
.tab-item:last-child{
    border-right:none;
}
.tab-item img{
    width:32px;
    height:32px;
    image-rendering: pixelated;
}
.tab-item .emoji-icon{
    font-size:28px;
    line-height:1;
}
.tab-item span.tab-label{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.4px;
    white-space:nowrap;
}
.tab-item:hover{
    background:#22222a;
    color:#c9c9d1;
}
.tab-item.active{
    background:#26262e;
    color:#fff;
}
.tab-item.active span.tab-label{
    color:#a9b6ff;
}
.top-bar{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:14px;
}

/* ---------- Play button (left of login) ---------- */
.login-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
    position:fixed;
    top:26px;
    right:34px;
    z-index:200;
}
.play-btn-wrapper{
    position:relative;
}
.play-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    background:#1c1c22;
    border:2px solid #2c2c34;
    color:#c9c9d1;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.15s ease, border-color 0.15s ease;
}
.play-btn:hover{
    background:#26262e;
}
.play-btn.logged-out{
    border-color:#ff6b6b;
    color:#ff6b6b;
}
.play-btn.logged-in{
    border-color:#6bff6b;
    color:#6bff6b;
}
.play-tooltip{
    position:absolute;
    top:calc(100% + 6px);
    left:50%;
    transform:translateX(-50%);
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:6px;
    padding:4px 10px;
    font-size:12px;
    color:#c9c9d1;
    white-space:nowrap;
    display:none;
    z-index:210;
    pointer-events:none;
}
.play-btn-wrapper:hover .play-tooltip{
    display:block;
}

.login-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:8px 18px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}
.login-btn:hover{
    background:#26262e;
}
.login-btn.logged-in{
    padding:5px 16px 5px 5px;
}
.login-face{
    width:26px;
    height:26px;
    border-radius:6px;
    overflow:hidden;
    background:#000;
    flex-shrink:0;
    image-rendering: pixelated;
}
.login-face img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.login-panel{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:16px;
    width:220px;
    display:none;
    z-index:200;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.login-panel.active{
    display:block;
}
.login-panel-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:#8b8b96;
    text-transform:uppercase;
    margin-bottom:10px;
}
.login-panel input{
    width:100%;
    background:#131318;
    border:1px solid #2c2c34;
    border-radius:7px;
    color:#fff;
    padding:8px 10px;
    font-size:13px;
    margin-bottom:8px;
    font-family: Arial, sans-serif;
}
.login-panel input:focus{
    outline:none;
    border-color:#4a4a5c;
}
.login-submit{
    width:100%;
    background:#3a3a44;
    border:none;
    color:#fff;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    margin-top:2px;
    transition: background 0.15s ease;
}
.login-submit:hover{
    background:#464652;
}
.login-error{
    color:#ff6b6b;
    font-size:12px;
    margin-top:6px;
    display:none;
}
.logout-btn{
    width:100%;
    background:#241414;
    border:1px solid #7a2323;
    color:#ff8a8a;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    transition: background 0.15s ease;
}
.logout-btn:hover{
    background:#2e1818;
}
.login-panel .logged-name{
    font-size:15px;
    font-weight:700;
    margin-bottom:12px;
    color:#fff;
}
.profile-btn{
    width:100%;
    background:#1a2a3a;
    border:1px solid #2a4a6a;
    color:#8ab4f8;
    padding:9px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    transition: background 0.15s ease;
    margin-bottom:8px;
}
.profile-btn:hover{
    background:#1f3348;
}

/* ---------- Info button (unchanged) ---------- */
.info-btn-wrapper{
    position:relative;
}
.info-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:7px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
}
.info-btn:hover{
    background:#26262e;
}
.info-icon{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#3a3a44;
    color:#fff;
    font-size:11px;
    font-weight:800;
    font-style:italic;
    font-family: 'Georgia', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}
.info-tooltip{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:12px 16px;
    min-width:180px;
    display:none;
    z-index:50;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.info-btn-wrapper:hover .info-tooltip{
    display:block;
}
.info-tooltip.overall-tooltip{
    min-width:220px;
    padding:12px 16px;
}
.info-tooltip-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:#8b8b96;
    text-transform:uppercase;
    margin-bottom:8px;
}
.info-tooltip-row{
    display:flex;
    justify-content:space-between;
    gap:16px;
    font-size:13px;
    padding:3px 0;
    font-family: monospace;
}
.info-tooltip-row span:first-child{
    font-weight:800;
}
.overall-tooltip .title-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 2px;
    padding: 4px 0;
}
.overall-tooltip .title-row .title-word {
    font-size: 17px;
    font-weight: 900;
    font-family: 'Bahnschrift', Arial, sans-serif;
    letter-spacing: 0.3px;
    margin-bottom: 0;
}
.overall-tooltip .title-row .title-desc {
    font-size: 13px;
    color: #8b8b96;
    font-weight: 600;
    font-family: monospace;
    padding-left: 0;
}

/* ---------- Search (unchanged) ---------- */
.search-btn-wrapper{
    position:relative;
}
.search-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:#1c1c22;
    border:1px solid #2c2c34;
    color:#c9c9d1;
    padding:7px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    font-family: Arial, sans-serif;
    cursor:pointer;
    transition: background 0.15s ease;
}
.search-btn:hover{
    background:#26262e;
}
.search-btn svg{
    width:14px;
    height:14px;
    flex-shrink:0;
}
.search-panel{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    padding:14px;
    width:250px;
    display:none;
    z-index:70;
    box-shadow: 0 10px 24px rgba(0,0,0,0.5);
}
.search-panel.active{
    display:block;
}
.search-input{
    width:100%;
    background:#131318;
    border:1px solid #2c2c34;
    border-radius:7px;
    color:#fff;
    padding:8px 10px;
    font-size:13px;
    margin-bottom:10px;
    font-family: Arial, sans-serif;
}
.search-input:focus{
    outline:none;
    border-color:#4a4a5c;
}
.search-results{
    max-height:220px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:4px;
}
.search-result-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:6px 8px;
    border-radius:7px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
}
.search-result-item:hover{
    background:#22222a;
}
.search-result-item img{
    width:26px;
    height:26px;
    border-radius:5px;
    image-rendering: pixelated;
    background:#000;
    flex-shrink:0;
}
.search-empty{
    color:#5c5c66;
    font-size:12px;
    padding:6px 2px;
}

/* ---------- Player row, modal, etc. (unchanged) ---------- */
.player{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}
.player:hover{
    transform: scale(1.035);
    box-shadow: 0 6px 16px rgba(0,0,0,0.45);
    filter: brightness(1.25);
}
.rank-flag{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 26px 14px 16px;
    background:#22222a;
    clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
    min-width:120px;
}
.rank-num{
    font-size:26px;
    font-weight:700;
    font-style:italic;
    color:#c7c7ce;
    width:26px;
}
.avatar{
    width:38px;
    height:38px;
    border-radius:6px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    color:#666;
    flex-shrink:0;
    overflow:hidden;
    image-rendering: pixelated;
}
.avatar img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.info{
    flex:1;
    display:flex;
    align-items:center;
    padding:0 16px;
    font-size:21px;
    font-weight:700;
    letter-spacing:0.3px;
    font-family: 'Bahnschrift', Arial, sans-serif;
}
.elo-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 22px;
}
.elo{
    font-size:18px;
    font-weight:900;
    color:#a9b6ff;
    font-family: 'Arial Black', Arial, sans-serif;
}
.tier-badge{
    font-size:12px;
    font-weight:800;
    padding:3px 9px;
    border-radius:999px;
    letter-spacing:0.5px;
    border:1px solid currentColor;
    white-space:nowrap;
}
.rank-1 .rank-flag{
    background: linear-gradient(100deg, #f4c744, #c99a1e);
}
.rank-1 .rank-num{ color:#3a2c00; }
.rank-2 .rank-flag{
    background: linear-gradient(100deg, #d6d9dd, #9ea3aa);
}
.rank-2 .rank-num{ color:#2b2e33; }
.rank-3 .rank-flag{
    background: linear-gradient(100deg, #d98b45, #a85f24);
}
.rank-3 .rank-num{ color:#3a2000; }
.toggle-btn{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#22222a;
    color:#fff;
    border:none;
    border-radius:8px;
    font-family: Arial, sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition: background 0.2s;
}
.toggle-btn:hover{
    background:#2e2e38;
}
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}
.modal-overlay.active{
    display:flex;
}
.modal-box{
    background:#131318;
    border-radius:16px;
    padding:36px;
    width:460px;
    max-width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
    text-align:center;
    border:1px solid #232329;
    font-family: Arial, sans-serif;
}
.modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#22222a;
    border:none;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s;
}
.modal-close:hover{
    background:#2e2e38;
}
.modal-avatar{
    width:110px;
    height:110px;
    border-radius:16px;
    background:#000;
    margin:6px auto 16px;
    overflow:hidden;
    border:2px solid #2a2a32;
    image-rendering: pixelated;
}
.modal-avatar img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
.modal-name{
    font-family: 'Bahnschrift', Arial, sans-serif;
    font-size:26px;
    font-weight:700;
    margin-bottom:16px;
}
.role-badge{
    position:absolute;
    top:16px;
    left:16px;
    display:inline-block;
    padding:5px 14px;
    border-radius:999px;
    font-weight:800;
    font-size:11px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    z-index:5;
}
.title-section{
    display:flex;
    justify-content:center;
    margin: 2px 0 28px;
}
.title-text-box{
    background:#191920;
    border:1px solid #2c2c34;
    border-radius:10px;
    height:46px;
    display:flex;
    align-items:center;
    padding:0 20px;
}
.title-badge-text{
    font-size:19px;
    font-weight:900;
    font-family: 'Bahnschrift', Arial, sans-serif;
    letter-spacing:0.4px;
    white-space:nowrap;
    background-size:100% 100%;
}
.role-player{
    color:#c9c9d1;
    border:1px solid #5a5a64;
    background:#202024;
}
.role-developer{
    color:#ff5c5c;
    border:1px solid #7a2323;
    background:#241414;
}
.role-owner{
    color:#5be6e6;
    border:1px solid #1f6b70;
    background:#132628;
}
.modal-section-label{
    text-align:left;
    color:#8b8b96;
    font-size:13px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:10px;
}
.position-card{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:22px;
}
.position-card .rank-flag{
    min-width:70px;
    padding:12px 22px 12px 14px;
}
.position-card .pos-info{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 14px;
    font-weight:700;
    font-size:15px;
    flex-wrap:wrap;
}
.position-card .pos-info .pos-points{
    color:#8b8b96;
    font-weight:600;
    font-size:13px;
}
.tiers-row{
    display:flex;
    gap:16px;
    justify-content:flex-start;
    flex-wrap:wrap;
    margin-bottom:6px;
}
.tier-icon-wrap{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
}
.tier-icon-circle{
    width:54px;
    height:54px;
    border-radius:50%;
    background:#191920;
    display:flex;
    align-items:center;
    justify-content:center;
    border:3px solid #454b54;
    overflow:hidden;
}
.tier-icon-circle img{
    width:30px;
    height:30px;
    image-rendering: pixelated;
}
.tier-icon-label{
    font-size:12px;
    font-weight:800;
    letter-spacing:0.4px;
}
.tier-elo-tip{
    position:absolute;
    bottom:calc(100% + 8px);
    left:50%;
    transform:translateX(-50%);
    background:#0e0e12;
    border:1px solid #2c2c34;
    border-radius:6px;
    padding:5px 10px;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    display:none;
    z-index:10;
    box-shadow: 0 6px 14px rgba(0,0,0,0.5);
}
.tier-icon-wrap:hover .tier-elo-tip{
    display:block;
}
.mini-tiers-row{
    display:flex;
    align-items:center;
    gap:10px;
}
.mini-tier-wrap{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}
.mini-tier-circle{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#131318;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid #454b54;
    overflow:hidden;
}
.mini-tier-circle img{
    width:16px;
    height:16px;
    image-rendering: pixelated;
}
.mini-tier-tip{
    display:none;
}
.mini-tier-wrap{ cursor:default; }
.global-mini-tip{
    position:fixed;
    background:#0e0e12;
    border:1px solid #2c2c34;
    border-radius:6px;
    padding:5px 10px;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    display:none;
    z-index:1000;
    box-shadow: 0 6px 14px rgba(0,0,0,0.5);
    pointer-events:none;
    transform:translate(-50%,-100%);
}
.gained-badge{
    font-size:18px;
    font-weight:900;
    color:#a9b6ff;
    font-family: 'Arial Black', Arial, sans-serif;
    white-space:nowrap;
}
.title-grad{
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    font-weight:800;
}
</style>
</head>
<body>

<!-- Login & Play button (fixed top-right) -->
<div class="login-wrapper" id="loginWrapper">
  <!-- Play button -->
  <div class="play-btn-wrapper">
    <button class="play-btn logged-out" id="playBtn">!</button>
    <div class="play-tooltip" id="playTooltip">Log in to play</div>
  </div>
  <!-- Login button -->
  <button class="login-btn" id="loginBtn">Log in</button>
  <!-- Login panel -->
  <div class="login-panel" id="loginPanel"></div>
</div>

<div class="container">
  <!-- Tab menu, top bar, etc. unchanged -->
  <div class="tab-menu" id="tabMenu"></div>
  <div class="top-bar">
    <div class="info-btn-wrapper">
      <button class="info-btn" id="infoBtn"><span class="info-icon">i</span>Info</button>
      <div class="info-tooltip" id="infoTooltip">Loading...</div>
    </div>
    <div class="search-btn-wrapper" id="searchWrapper">
      <button class="search-btn" id="searchBtn">

/* ---------- Tier system (unchanged) ---------- */
const TIER_STEPS = [
    { name: "LT1", pct: 10 },
    { name: "HT2", pct: 10 },
    { name: "LT2", pct: 10 },
    { name: "HT3", pct: 10 },
    { name: "LT3", pct: 15 },
    { name: "HT4", pct: 15 },
    { name: "LT4", pct: 15 },
    { name: "HT5", pct: 15 }
];
const HT1_BASE = 1250;
const LT5_FLOOR = 1000;
const TIER_COLORS = {
    HT1: "#ffd700",
    LT1: "#e6c15c",
    HT2: "#c9c9d1",
    LT2: "#a9a9b2",
    HT3: "#cd7f32",
    LT3: "#b5793c",
    HT4: "#7d8b99",
    LT4: "#6b7480",
    HT5: "#5a6572",
    LT5: "#454b54"
};
const TIER_ORDER = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];

function getTierThresholds(topElo){
    const anchor = topElo >= HT1_BASE ? topElo : HT1_BASE;
    const range = anchor - LT5_FLOOR;
    const thresholds = { HT1: anchor };
    let cumulativePct = 0;
    TIER_STEPS.forEach(step => {
        cumulativePct += step.pct;
        thresholds[step.name] = LT5_FLOOR + range * (1 - cumulativePct / 100);
    });
    return thresholds;
}

function getTier(elo, thresholds){
    if(elo < LT5_FLOOR) return "LT5";
    if(elo >= thresholds.HT1) return "HT1";
    if(elo >= thresholds.LT1) return "LT1";
    if(elo >= thresholds.HT2) return "HT2";
    if(elo >= thresholds.LT2) return "LT2";
    if(elo >= thresholds.HT3) return "HT3";
    if(elo >= thresholds.LT3) return "LT3";
    if(elo >= thresholds.HT4) return "HT4";
    if(elo >= thresholds.LT4) return "LT4";
    if(elo >= thresholds.HT5) return "HT5";
    return "LT5";
}

function sortEntriesByTier(entries){
    return entries.sort((a, b) => {
        if(a.tier && b.tier && a.tier !== b.tier) {
            return TIER_ORDER.indexOf(a.tier) - TIER_ORDER.indexOf(b.tier);
        }
        if(a.tier && !b.tier) return -1;
        if(!a.tier && b.tier) return 1;
        if(a.hasValue && b.hasValue) return b.elo - a.elo;
        if(a.hasValue) return -1;
        if(b.hasValue) return 1;
        return 0;
    });
}

const infoTooltip = document.getElementById("infoTooltip");
const TIER_ORDER_DISPLAY = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5"];

function renderInfoTooltip(thresholds){
    let html = `<div class="info-tooltip-title">Elo required</div>`;
    TIER_ORDER_DISPLAY.forEach(name => {
        const val = Math.ceil(thresholds[name]);
        html += `<div class="info-tooltip-row"><span style="color:${TIER_COLORS[name]}">${name}</span><span>${val}+</span></div>`;
    });
    html += `<div class="info-tooltip-row"><span style="color:${TIER_COLORS.LT5}">LT5</span><span>&lt;${LT5_FLOOR}</span></div>`;
    infoTooltip.innerHTML = html;
}

/* ---------- Titles ---------- */
function computeTitleThresholds(){
    const gainFor = (tierName) => {
        let total = 0;
        SUB_BOARDS.forEach(key => {
            const board = LEADERBOARDS[key];
            const sorted = getSortedPlayers(board.field);
            const topElo = sorted.length ? sorted[0][board.field] : 0;
            const thresholds = getTierThresholds(topElo);
            total += Math.max(0, thresholds[tierName] - LT5_FLOOR);
        });
        return Math.ceil(total);
    };
    return {
        Divine: gainFor("LT2"),
        Celestial: gainFor("HT3"),
        Eternal: gainFor("LT3"),
        Ascendant: gainFor("HT4"),
        Novice: 0
    };
}

function isNovaPlayer(player){
    if(!SUB_BOARDS.length) return false;
    return SUB_BOARDS.every(key => {
        const board = LEADERBOARDS[key];
        const sorted = getSortedPlayers(board.field);
        return sorted.length && sorted[0].name === player.name;
    });
}

function getPlayerTitle(player){
    if(isNovaPlayer(player)) return "Nova";
    const reqs = computeTitleThresholds();
    const gained = player.__total - 1000 * SUB_BOARDS.length;
    if(gained >= reqs.Divine) return "Divine";
    if(gained >= reqs.Celestial) return "Celestial";
    if(gained >= reqs.Eternal) return "Eternal";
    if(gained >= reqs.Ascendant) return "Ascendant";
    return "Novice";
}

function renderTitleInfoTooltip(){
    const reqs = computeTitleThresholds();
    const colorMap = {
        Nova: "linear-gradient(100deg, #c190ec, #a13ca5)",

        Ascendant: "linear-gradient(100deg, #d67638, #b0483c)",
        Novice: "linear-gradient(100deg, #9d8aa5, #82638a)"
    };
    const descMap = {
        Nova: "#1 in every gamemode",
        Divine: `${reqs.Divine}+ gained`,
        Celestial: `${reqs.Celestial}+ gained`,
        Eternal: `${reqs.Eternal}+ gained`,
        Ascendant: `${reqs.Ascendant}+ gained`,
        Novice: `0+ gained`
    };
    let html = `<div class="info-tooltip-title">Titles</div>`;
    const order = ["Nova", "Divine", "Celestial", "Eternal", "Ascendant", "Novice"];

function renderMiniTierIcons(player){
    const entries = SUB_BOARDS.map(key => {
        const board = LEADERBOARDS[key];

        const elo = hasValue ? player[board.field] : null;
        const tier = hasValue ? getTier(elo, thresholds) : null;
        return { board, hasValue, elo, tier };

function getSortedPlayers(field){

/* ---------- 🔐 Login with Supabase Auth ---------- */
const loginBtn = document.getElementById("loginBtn");
const loginPanel = document.getElementById("loginPanel");
const loginWrapper = document.getElementById("loginWrapper");
const playBtn = document.getElementById("playBtn");
const playTooltip = document.getElementById("playTooltip");

// Helper to build fake email from username
function buildEmail(username) {
    return username.toLowerCase() + "@minecraft.local";
}

// Update play button state
function updatePlayButton(loggedIn){
    if(loggedIn){
        playBtn.classList.remove("logged-out");
        playBtn.classList.add("logged-in");
        playBtn.textContent = "▶";
        playTooltip.textContent = "Play";
    } else {
        playBtn.classList.remove("logged-in");
        playBtn.classList.add("logged-out");
        playBtn.textContent = "!";
        playTooltip.textContent = "Log in to play";
    }
}

// Render login panel (no sign‑up, only login form)
function renderLoggedOutPanel(){
    loginPanel.innerHTML = `
        <div class="login-panel-title">Player Login</div>
        <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
        <button class="login-submit" id="loginSubmit">Log in</button>
        <div class="login-error" id="loginError">Invalid username or password.</div>
    `;
    document.getElementById("loginSubmit").addEventListener("click", attemptLogin);
    document.getElementById("loginPassword").addEventListener("keydown", (e) => {
        if(e.key === "Enter") attemptLogin();
    });
    updatePlayButton(false);
}

// Render logged‑in panel (with profile button)
function renderLoggedInPanel(){
    loginPanel.innerHTML = `
        <div class="logged-name">${currentUser.name}</div>
        <button class="profile-btn" id="profileBtn">Show Player Profile</button>
        <button class="logout-btn" id="logoutBtn">Log out</button>
    `;
    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("profileBtn").addEventListener("click", () => {
        // Close the login panel and open the profile modal for the logged-in user
        loginPanel.classList.remove("active");
        if(currentUser){
            openProfile(currentUser);
        }
    });
    updatePlayButton(true);
}

async function attemptLogin(){
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorEl = document.getElementById("loginError");
    errorEl.style.display = "none";

    if(!username || !password) return;

    const email = buildEmail(username);

    try {
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            errorEl.textContent = "Invalid username or password.";
            errorEl.style.display = "block";
            return;
        }

        // Auth success – now fetch the player's data from 'players' table
        const { data: playerData, error: playerError } = await supabase
            .from("players")
            .select("*")
            .ilike("name", username)
            .maybeSingle();

        if (playerError || !playerData) {
            // Auth succeeded but no matching player record – log out and show error
            await supabase.auth.signOut();
            errorEl.textContent = "Account exists but no player profile found. Contact admin.";
            errorEl.style.display = "block";
            return;
        }

        // Store player data
        currentUser = playerData;
        updateLoginButton();
        renderLoggedInPanel();
        // Close the panel after login
        loginPanel.classList.remove("active");

    } catch (err) {
        errorEl.textContent = "Something went wrong. Try again.";
        errorEl.style.display = "block";
    }
}

async function logout(){
    await supabase.auth.signOut();
    currentUser = null;
    updateLoginButton();
    renderLoggedOutPanel();
    loginPanel.classList.remove("active");
    updatePlayButton(false);
}

function updateLoginButton(){
    if(currentUser){
        loginBtn.classList.add("logged-in");
        loginBtn.innerHTML = `
            <div class="login-face"><img src="${avatarUrl(currentUser.name, 26)}" alt=""></div>
            ${currentUser.name}
        `;
    } else {
        loginBtn.classList.remove("logged-in");
        loginBtn.textContent = "Log in";
    }
}

// Restore session on page load
async function restoreSession(){
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        // User is logged in via Supabase Auth – fetch player data
        const user = session.user;
        const email = user.email;
        // Extract username from fake email (remove '@minecraft.local')
        const username = email.replace(/@minecraft\.local$/, '');
        const { data: playerData, error } = await supabase
            .from("players")
            .select("*")
            .ilike("name", username)
            .maybeSingle();
        if (!error && playerData) {
            currentUser = playerData;
            updateLoginButton();
            renderLoggedInPanel();
            // The panel stays hidden; the button shows the avatar and name
        } else {
            // If player record missing, sign out
            await supabase.auth.signOut();
            currentUser = null;
            updateLoginButton();
            renderLoggedOutPanel();
        }
    } else {
        // No session – show logged out state
        currentUser = null;
        updateLoginButton();
        renderLoggedOutPanel();
    }
}

// Click on login button toggles panel
loginBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    loginPanel.classList.toggle("active");
});

// Close panel when clicking outside
document.addEventListener("click", (e) => {
    if(!loginWrapper.contains(e.target)){
        loginPanel.classList.remove("active");
    }
    if(!searchWrapper.contains(e.target)){
        searchPanel.classList.remove("active");
    }
});

// Init – render login panel and try to restore session
renderLoggedOutPanel();
restoreSession();

/* ---------- Leaderboard data loading ---------- */
renderTabMenu();
setTitle(currentBoard);

async function loadPlayers(){
    const { data, error } = await supabase
        .from("players")
        .select("*");
    if(error){
        list.innerHTML = "Error loading data";
        toggleBtn.style.display = "none";
        return;
    }
    allPlayers = data.map(p => ({
        ...p,
        __total: (Number(p.KanalServer) || 0) + (Number(p.LowblockMace) || 0)
    }));
    render();
    // If currentUser is set but their data may have changed, refresh it
    if(currentUser){
        const fresh = allPlayers.find(p => p.name.toLowerCase() === currentUser.name.toLowerCase());
        if(fresh) currentUser = fresh;
    }
}

loadPlayers();
setInterval(loadPlayers, 5000);
</script>
