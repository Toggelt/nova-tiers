<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elo Leaderboard</title>
<style>
body{
    font-family: Arial;
    background:#0e0e10;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:400px;
    background:#18181b;
    padding:20px;
    border-radius:12px;
    border:1px solid #2a2a2e;
}

h2{
    text-align:center;
    margin-top:0;
}

.player{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:6px 0;
    background:#111113;
    border-radius:8px;
    font-family: monospace;
}
</style>
</head>
<body>

<div class="container">
<h2>🏆 ELO LEADERBOARD</h2>
<div id="list">Loading...</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// 🔴 PASTE YOUR KEYS HERE
const SUPABASE_URL = "https://fyyyjjysztzxmmdgubnb.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHwFOpox2rS81CKz832IBg_fZr5GoWH";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadPlayers(){
    const { data, error } = await supabase
        .from("players")
        .select("*")
        .order("elo", { ascending: false });

    const list = document.getElementById("list");
    list.innerHTML = "";

    if(error){
        list.innerHTML = "Error loading data";
        return;
    }

    data.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "player";
        div.innerHTML = `
            <span>${i+1}. ${p.name}</span>
            <span>${p.elo}</span>
        `;
        list.appendChild(div);
    });
}

loadPlayers();
setInterval(loadPlayers, 5000); // auto refresh every 5 sec
</script>

</body>
</html>
