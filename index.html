<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elo Leaderboard</title>
<style>
body{
    font-family: Arial;
    background:#0e0e10;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}
.container{
    width:420px;
    background:#18181b;
    padding:20px;
    border-radius:12px;
    border:1px solid #2a2a2e;
}
h2{
    text-align:center;
    margin-top:0;
}
.player{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
    margin:8px 0;
    background:#111113;
    border-radius:12px;
    border:1px solid #2a2a2e;
    font-family: monospace;
    font-size:15px;
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
}
.player:hover{
    background:#1e1e22;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}

/* Top 3 get bigger boxes */
.rank-1, .rank-2, .rank-3{
    padding:20px 18px;
    font-size:17px;
    font-weight:bold;
    border:none;
}

.rank-1{
    background: linear-gradient(135deg, #ffd700, #a8860a);
    color:#1a1a1a;
}
.rank-1:hover{
    background: linear-gradient(135deg, #ffe14d, #c49c14);
}

.rank-2{
    background: linear-gradient(135deg, #d9d9d9, #8c8c8c);
    color:#1a1a1a;
}
.rank-2:hover{
    background: linear-gradient(135deg, #ebebeb, #a3a3a3);
}

.rank-3{
    background: linear-gradient(135deg, #cd7f32, #8a5322);
    color:#f5f0e6;
}
.rank-3:hover{
    background: linear-gradient(135deg, #e0975a, #a3652c);
}

.toggle-btn{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#2a2a2e;
    color:#fff;
    border:none;
    border-radius:8px;
    font-family: Arial;
    font-size:14px;
    cursor:pointer;
    transition: background 0.2s;
}
.toggle-btn:hover{
    background:#3a3a3e;
}
</style>
</head>
<body>
<div class="container">
<h2>🏆 ELO LEADERBOARD</h2>
<div id="list">Loading...</div>
<button id="toggleBtn" class="toggle-btn" style="display:none;">Show all</button>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
// 🔴 PASTE YOUR KEYS HERE
const SUPABASE_URL = "https://fyyyjjysztzxmmdgubnb.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHwFOpox2rS81CKz832IBg_fZr5GoWH";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLLAPSED_COUNT = 5; // how many players to show before "Show all"
let allPlayers = [];
let expanded = false;

const list = document.getElementById("list");
const toggleBtn = document.getElementById("toggleBtn");

function rankClass(rank){
    if(rank === 1) return "rank-1";
    if(rank === 2) return "rank-2";
    if(rank === 3) return "rank-3";
    return "";
}

function render(){
    list.innerHTML = "";
    const playersToShow = expanded ? allPlayers : allPlayers.slice(0, COLLAPSED_COUNT);

    playersToShow.forEach((p, i) => {
        const rank = i + 1;
        const div = document.createElement("div");
        div.className = `player ${rankClass(rank)}`;
        div.innerHTML = `
            <span>${rank}. ${p.name}</span>
            <span>${p.KanalServer}</span>
        `;
        list.appendChild(div);
    });

    if(allPlayers.length > COLLAPSED_COUNT){
        toggleBtn.style.display = "block";
        toggleBtn.textContent = expanded ? "Show less" : `Show all (${allPlayers.length})`;
    } else {
        toggleBtn.style.display = "none";
    }
}

toggleBtn.addEventListener("click", () => {
    expanded = !expanded;
    render();
});

async function loadPlayers(){
    const { data, error } = await supabase
        .from("players")
        .select("*")
        .order("KanalServer", { ascending: false });

    if(error){
        list.innerHTML = "Error loading data";
        toggleBtn.style.display = "none";
        return;
    }

    allPlayers = data;
    render();
}

loadPlayers();
setInterval(loadPlayers, 5000); // auto refresh every 5 sec
</script>
</body>
</html>
