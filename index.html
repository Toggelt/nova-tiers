<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elo Leaderboard</title>
<style>
*{
    box-sizing:border-box;
}
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#0b0b0e;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}
.container{
    width:520px;
    background:#131318;
    padding:18px;
    border-radius:14px;
    border:1px solid #232329;
}
h2{
    text-align:center;
    margin-top:4px;
    margin-bottom:18px;
    letter-spacing:1px;
}
.player{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.player:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.45);
}

.rank-flag{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 26px 14px 16px;
    background:#22222a;
    clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
    min-width:120px;
}
.rank-num{
    font-size:26px;
    font-weight:800;
    font-style:italic;
    color:#c7c7ce;
    width:26px;
}
.avatar{
    width:38px;
    height:38px;
    border-radius:6px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    color:#666;
    flex-shrink:0;
}

.info{
    flex:1;
    display:flex;
    align-items:center;
    padding:0 16px;
    font-size:19px;
    font-weight:700;
}

.elo{
    display:flex;
    align-items:center;
    padding:0 22px;
    font-size:17px;
    font-weight:700;
    color:#a9b6ff;
    font-family: monospace;
}

/* Rank 1 - gold */
.rank-1 .rank-flag{
    background: linear-gradient(100deg, #f4c744, #c99a1e);
}
.rank-1 .rank-num{ color:#3a2c00; }

/* Rank 2 - silver */
.rank-2 .rank-flag{
    background: linear-gradient(100deg, #d6d9dd, #9ea3aa);
}
.rank-2 .rank-num{ color:#2b2e33; }

/* Rank 3 - bronze */
.rank-3 .rank-flag{
    background: linear-gradient(100deg, #d98b45, #a85f24);
}
.rank-3 .rank-num{ color:#3a2000; }

.toggle-btn{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#22222a;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    transition: background 0.2s;
}
.toggle-btn:hover{
    background:#2e2e38;
}
</style>
</head>
<body>
<div class="container">
<h2>🏆 ELO LEADERBOARD</h2>
<div id="list">Loading...</div>
<button id="toggleBtn" class="toggle-btn" style="display:none;">Show all</button>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
// 🔴 PASTE YOUR KEYS HERE
const SUPABASE_URL = "https://fyyyjjysztzxmmdgubnb.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHwFOpox2rS81CKz832IBg_fZr5GoWH";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLLAPSED_COUNT = 5; // how many players to show before "Show all"
let allPlayers = [];
let expanded = false;

const list = document.getElementById("list");
const toggleBtn = document.getElementById("toggleBtn");

function rankClass(rank){
    if(rank === 1) return "rank-1";
    if(rank === 2) return "rank-2";
    if(rank === 3) return "rank-3";
    return "";
}

function render(){
    list.innerHTML = "";
    const playersToShow = expanded ? allPlayers : allPlayers.slice(0, COLLAPSED_COUNT);

    playersToShow.forEach((p, i) => {
        const rank = i + 1;
        const div = document.createElement("div");
        div.className = `player ${rankClass(rank)}`;
        div.innerHTML = `
            <div class="rank-flag">
                <span class="rank-num">${rank}.</span>
                <div class="avatar">?</div>
            </div>
            <div class="info">${p.name}</div>
            <div class="elo">${p.KanalServer}</div>
        `;
        list.appendChild(div);
    });

    if(allPlayers.length > COLLAPSED_COUNT){
        toggleBtn.style.display = "block";
        toggleBtn.textContent = expanded ? "Show less" : `Show all (${allPlayers.length})`;
    } else {
        toggleBtn.style.display = "none";
    }
}

toggleBtn.addEventListener("click", () => {
    expanded = !expanded;
    render();
});

async function loadPlayers(){
    const { data, error } = await supabase
        .from("players")
        .select("*")
        .order("KanalServer", { ascending: false });

    if(error){
        list.innerHTML = "Error loading data";
        toggleBtn.style.display = "none";
        return;
    }

    allPlayers = data;
    render();
}

loadPlayers();
setInterval(loadPlayers, 5000); // auto refresh every 5 sec
</script>
</body>
</html>
