<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanal Server Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
*{
    box-sizing:border-box;
}
body{
    font-family: Arial, sans-serif;
    background:#0b0b0e;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:30px;
}
.container{
    width:640px;
    background:#131318;
    padding:20px;
    border-radius:14px;
    border:1px solid #232329;
}
h2{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    white-space:nowrap;
    text-align:center;
    margin-top:4px;
    margin-bottom:18px;
    letter-spacing:2px;
    font-weight:800;
    text-transform:uppercase;
    font-family: 'Orbitron', Arial, sans-serif;
}
.title-icon{
    width:30px;
    height:30px;
    flex-shrink:0;
}
.title-icon svg{
    width:100%;
    height:100%;
}

.player{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}
.player:hover{
    transform: scale(1.035);
    box-shadow: 0 6px 16px rgba(0,0,0,0.45);
    filter: brightness(1.25);
}

.rank-flag{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 26px 14px 16px;
    background:#22222a;
    clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
    min-width:120px;
}
.rank-num{
    font-size:26px;
    font-weight:700;
    font-style:italic;
    color:#c7c7ce;
    width:26px;
}
.avatar{
    width:38px;
    height:38px;
    border-radius:6px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    color:#666;
    flex-shrink:0;
    overflow:hidden;
    image-rendering: pixelated;
}
.avatar img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}

.info{
    flex:1;
    display:flex;
    align-items:center;
    padding:0 16px;
    font-size:21px;
    font-weight:700;
    letter-spacing:0.3px;
    font-family: 'Bahnschrift', Arial, sans-serif;
}

.elo-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 22px;
}
.elo{
    font-size:18px;
    font-weight:900;
    color:#a9b6ff;
    font-family: 'Arial Black', Arial, sans-serif;
}
.tier-badge{
    font-size:12px;
    font-weight:800;
    padding:3px 9px;
    border-radius:999px;
    letter-spacing:0.5px;
    border:1px solid currentColor;
    white-space:nowrap;
}

/* Rank 1 - gold */
.rank-1 .rank-flag{
    background: linear-gradient(100deg, #f4c744, #c99a1e);
}
.rank-1 .rank-num{ color:#3a2c00; }

/* Rank 2 - silver */
.rank-2 .rank-flag{
    background: linear-gradient(100deg, #d6d9dd, #9ea3aa);
}
.rank-2 .rank-num{ color:#2b2e33; }

/* Rank 3 - bronze */
.rank-3 .rank-flag{
    background: linear-gradient(100deg, #d98b45, #a85f24);
}
.rank-3 .rank-num{ color:#3a2000; }

.toggle-btn{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#22222a;
    color:#fff;
    border:none;
    border-radius:8px;
    font-family: Arial, sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition: background 0.2s;
}
.toggle-btn:hover{
    background:#2e2e38;
}

/* ---------- Profile Modal ---------- */
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}
.modal-overlay.active{
    display:flex;
}
.modal-box{
    background:#131318;
    border-radius:16px;
    padding:30px;
    width:360px;
    max-width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
    text-align:center;
    border:1px solid #232329;
    font-family: Arial, sans-serif;
}
.modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#22222a;
    border:none;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s;
}
.modal-close:hover{
    background:#2e2e38;
}

.modal-avatar{
    width:110px;
    height:110px;
    border-radius:16px;
    background:#000;
    margin:6px auto 16px;
    overflow:hidden;
    border:2px solid #2a2a32;
    image-rendering: pixelated;
}
.modal-avatar img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
}

.modal-name{
    font-family: 'Bahnschrift', Arial, sans-serif;
    font-size:26px;
    font-weight:700;
    margin-bottom:16px;
}

/* Role badge (replaces old Kanal Server badge) */
.role-badge{
    display:inline-block;
    padding:8px 22px;
    border-radius:999px;
    font-weight:800;
    font-size:14px;
    letter-spacing:0.6px;
    margin-bottom:26px;
    text-transform:uppercase;
}
.role-player{
    color:#c9c9d1;
    border:1px solid #5a5a64;
    background:#202024;
}
.role-developer{
    color:#ff5c5c;
    border:1px solid #7a2323;
    background:#241414;
}
.role-owner{
    color:#5be6e6;
    border:1px solid #1f6b70;
    background:#132628;
}

.modal-section-label{
    text-align:left;
    color:#8b8b96;
    font-size:13px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:10px;
}

.position-card{
    display:flex;
    align-items:stretch;
    background:#191920;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:22px;
}
.position-card .rank-flag{
    min-width:70px;
    padding:12px 22px 12px 14px;
}
.position-card .pos-info{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 14px;
    font-weight:700;
    font-size:15px;
    flex-wrap:wrap;
}
.position-card .pos-info .pos-points{
    color:#8b8b96;
    font-weight:600;
    font-size:13px;
}

.placeholder-card{
    display:flex;
    align-items:center;
    gap:10px;
    background:#17171c;
    border:1px dashed #2c2c34;
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:12px;
    color:#5c5c66;
    font-size:14px;
    font-weight:600;
}
.placeholder-card .ph-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#2c2c34;
    flex-shrink:0;
}
</style>
</head>
<body>
<div class="container">
<h2><span class="title-icon" id="titleIcon"></span>Kanal Server Leaderboard</h2>
<div id="list">Loading...</div>
<button id="toggleBtn" class="toggle-btn" style="display:none;">Show all</button>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-avatar" id="modalAvatar"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="role-badge" id="modalRoleBadge"></div>

    <div class="modal-section-label">Position</div>
    <div class="position-card" id="modalPositionCard"></div>

    <div class="modal-section-label">Other Leaderboards</div>
    <div class="placeholder-card"><div class="ph-dot"></div>Coming soon</div>
    <div class="placeholder-card"><div class="ph-dot"></div>Coming soon</div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
// 🔴 PASTE YOUR KEYS HERE
const SUPABASE_URL = "https://fyyyjjysztzxmmdgubnb.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHwFOpox2rS81CKz832IBg_fZr5GoWH";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLLAPSED_COUNT = 5; // how many players to show before "Show all"
let allPlayers = [];
let expanded = false;

const list = document.getElementById("list");
const toggleBtn = document.getElementById("toggleBtn");

/* ---------- Pixel icon: enchanted netherite helmet w/ amethyst trim ---------- */
function buildHelmetIconSVG(){
    const grid = [
        "....TTTT....",
        "...TBBBBT...",
        "..TBBHHBBT..",
        ".TBBHHHHBBT.",
        "TBBHEEEEHBBT",
        "TBBHEEEEHBBT",
        "TBBHHHHHHBBT",
        ".TBBBBBBBBT.",
        ".TBBBBBBBBT.",
        "..TBBBBBBT..",
        "...TBBBBT...",
        "....TTTT...."
    ];
    const colors = {
        T: "#9c5cff",
        B: "#3a3a40",
        H: "#57575e",
        E: "#0c0c10"
    };
    let rects = "";
    grid.forEach((row, y) => {
        for(let x = 0; x < row.length; x++){
            const c = row[x];
            if(c === "." ) continue;
            rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${colors[c]}"/>`;
        }
    });
    const sparkles = `
        <rect x="1" y="1" width="0.6" height="0.6" fill="#f0e3ff" opacity="0.9"/>
        <rect x="10.2" y="3" width="0.6" height="0.6" fill="#f0e3ff" opacity="0.7"/>
        <rect x="3.5" y="9.6" width="0.6" height="0.6" fill="#f0e3ff" opacity="0.8"/>
        <rect x="8" y="10.2" width="0.6" height="0.6" fill="#f0e3ff" opacity="0.6"/>
    `;
    return `<svg viewBox="0 0 13 12" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${rects}${sparkles}</svg>`;
}

document.getElementById("titleIcon").innerHTML = buildHelmetIconSVG();

/* ---------- Tier system ---------- */
// Cumulative % subtracted from HT1 elo (=100%) to reach each tier's threshold
const TIER_STEPS = [
    { name: "LT1", pct: 10 },
    { name: "HT2", pct: 20 },
    { name: "LT2", pct: 30 },
    { name: "HT3", pct: 40 },
    { name: "LT3", pct: 55 },
    { name: "HT4", pct: 70 },
    { name: "LT4", pct: 85 },
    { name: "HT5", pct: 100 }
];
const HT1_BASE = 1250;
const LT5_FLOOR = 1000; // below this elo is always LT5, regardless of scaling

const TIER_COLORS = {
    HT1: "#ffd700",
    LT1: "#e6c15c",
    HT2: "#c9c9d1",
    LT2: "#a9a9b2",
    HT3: "#cd7f32",
    LT3: "#b5793c",
    HT4: "#7d8b99",
    LT4: "#6b7480",
    HT5: "#5a6572",
    LT5: "#454b54"
};

function getTierThresholds(topElo){
    const anchor = topElo >= HT1_BASE ? topElo : HT1_BASE;
    const thresholds = { HT1: anchor };
    let cumulativePct = 0;
    TIER_STEPS.forEach(step => {
        cumulativePct += step.pct;
        thresholds[step.name] = anchor * (1 - cumulativePct / 100);
    });
    return thresholds;
}

function getTier(elo, thresholds){
    if(elo < LT5_FLOOR) return "LT5";
    if(elo >= thresholds.HT1) return "HT1";
    if(elo >= thresholds.LT1) return "LT1";
    if(elo >= thresholds.HT2) return "HT2";
    if(elo >= thresholds.LT2) return "LT2";
    if(elo >= thresholds.HT3) return "HT3";
    if(elo >= thresholds.LT3) return "LT3";
    if(elo >= thresholds.HT4) return "HT4";
    if(elo >= thresholds.LT4) return "LT4";
    if(elo >= thresholds.HT5) return "HT5";
    return "LT5";
}

/* ---------- Roles ---------- */
function getRole(name){
    if(name === "TestingCheats") return { label: "Developer", cls: "role-developer" };
    if(name === "cutekiss") return { label: "Tierlist Owner", cls: "role-owner" };
    return { label: "Player", cls: "role-player" };
}

function rankClass(rank){
    if(rank === 1) return "rank-1";
    if(rank === 2) return "rank-2";
    if(rank === 3) return "rank-3";
    return "";
}

function avatarUrl(name, size){
    return `https://mc-heads.net/avatar/${encodeURIComponent(name)}/${size}`;
}

function render(){
    list.innerHTML = "";
    const playersToShow = expanded ? allPlayers : allPlayers.slice(0, COLLAPSED_COUNT);
    const topElo = allPlayers.length ? allPlayers[0].KanalServer : 0;
    const thresholds = getTierThresholds(topElo);

    playersToShow.forEach((p, i) => {
        const rank = i + 1;
        const tier = getTier(p.KanalServer, thresholds);
        const div = document.createElement("div");
        div.className = `player ${rankClass(rank)}`;
        div.innerHTML = `
            <div class="rank-flag">
                <span class="rank-num">${rank}.</span>
                <div class="avatar">
                    <img src="${avatarUrl(p.name, 38)}" alt="${p.name}" onerror="this.parentElement.innerHTML='?'">
                </div>
            </div>
            <div class="info">${p.name}</div>
            <div class="elo-wrap">
                <span class="elo">${p.KanalServer}</span>
                <span class="tier-badge" style="color:${TIER_COLORS[tier]}">${tier}</span>
            </div>
        `;
        div.addEventListener("click", () => openProfile(p, rank, tier));
        list.appendChild(div);
    });

    if(allPlayers.length > COLLAPSED_COUNT){
        toggleBtn.style.display = "block";
        toggleBtn.textContent = expanded ? "Show less" : `Show all (${allPlayers.length})`;
    } else {
        toggleBtn.style.display = "none";
    }
}

toggleBtn.addEventListener("click", () => {
    expanded = !expanded;
    render();
});

/* ---------- Profile Modal logic ---------- */
const modalOverlay = document.getElementById("modalOverlay");
const modalClose = document.getElementById("modalClose");
const modalAvatar = document.getElementById("modalAvatar");
const modalName = document.getElementById("modalName");
const modalRoleBadge = document.getElementById("modalRoleBadge");
const modalPositionCard = document.getElementById("modalPositionCard");

function openProfile(player, rank, tier){
    modalAvatar.innerHTML = `<img src="${avatarUrl(player.name, 110)}" alt="${player.name}" onerror="this.parentElement.innerHTML='?'">`;
    modalName.textContent = player.name;

    const role = getRole(player.name);
    modalRoleBadge.textContent = role.label;
    modalRoleBadge.className = `role-badge ${role.cls}`;

    modalPositionCard.className = `position-card ${rankClass(rank)}`;
    modalPositionCard.innerHTML = `
        <div class="rank-flag">
            <span class="rank-num">${rank}.</span>
        </div>
        <div class="pos-info">
            🏆 OVERALL <span class="pos-points">(${player.KanalServer} points)</span>
            <span class="tier-badge" style="color:${TIER_COLORS[tier]}">${tier}</span>
        </div>
    `;

    modalOverlay.classList.add("active");
}

function closeProfile(){
    modalOverlay.classList.remove("active");
}

modalClose.addEventListener("click", closeProfile);
modalOverlay.addEventListener("click", (e) => {
    if(e.target === modalOverlay) closeProfile();
});

async function loadPlayers(){
    const { data, error } = await supabase
        .from("players")
        .select("*")
        .order("KanalServer", { ascending: false });

    if(error){
        list.innerHTML = "Error loading data";
        toggleBtn.style.display = "none";
        return;
    }

    allPlayers = data;
    render();
}

loadPlayers();
setInterval(loadPlayers, 5000); // auto refresh every 5 sec
</script>
</body>
</html>
